# Orchestrator Packet Template
# Copy to mailroom/state/orchestration/<LOOP_ID>/packet.yaml
# Fill in all required fields before dispatching subagents.
# See: ops/bindings/orchestration.packet.contract.yaml

loop_id: "LOOP-REPLACE-ME"
execution_mode: orchestrator_subagents
owner_terminal: "SPINE-CONTROL-01"
created_at_utc: "YYYY-MM-DDTHH:MM:SSZ"

wave_plan:
  - wave_id: W1
    objective: "Description of wave 1 work"
    subagents: [subagent-a, subagent-b]
    depends_on: []

  - wave_id: W2
    objective: "Description of wave 2 work"
    subagents: [subagent-c]
    depends_on: [W1]

subagent_allocation:
  - agent_id: subagent-a
    role: "contracts-and-schema"
    assigned_gaps: [GAP-OP-XXXX]
    worktree_branch: "LOOP-REPLACE-ME/subagent-a"

  - agent_id: subagent-b
    role: "cli-and-artifacts"
    assigned_gaps: [GAP-OP-YYYY]
    worktree_branch: "LOOP-REPLACE-ME/subagent-b"

worktree_mapping:
  - agent_id: subagent-a
    worktree_path: "~/.wt/agentic-spine/subagent-a"
    branch_name: "LOOP-REPLACE-ME/subagent-a"

  - agent_id: subagent-b
    worktree_path: "~/.wt/agentic-spine/subagent-b"
    branch_name: "LOOP-REPLACE-ME/subagent-b"

integration_order:
  - step: 1
    source_branch: "LOOP-REPLACE-ME/subagent-a"
    target_branch: main
    merge_strategy: rebase

  - step: 2
    source_branch: "LOOP-REPLACE-ME/subagent-b"
    target_branch: main
    merge_strategy: rebase

verification_sequence:
  - step: 1
    verify_command: "./bin/ops cap run verify.run -- fast"
    expected_result: PASS


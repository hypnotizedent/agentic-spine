    description: "All 4 mail-archiver accounts (Gmail, iCloud, Microsoft, Stalwart) show stable live-sync with no active import jobs."
    verification: "./bin/ops cap run communications.mailarchiver.import.status -- --json"
    acceptance: "import.state == 'complete' AND all account sync.state == 'active' in account linkage contract"
    status: met
    evidence: "Account linkage contract v3 (2026-03-02): all 4 accounts sync.state=active"

  - id: db-backup-governed
    description: "PostgreSQL backup job is registered in backup schedule and inventory with restore-proof path."
    verification: "yq '.jobs[] | select(.id == \"mail-archiver-db-pgdump-daily\")' ops/bindings/backup.schedule.yaml"
    acceptance: "backup.schedule.yaml contains mail-archiver-db-pgdump-daily with enabled=true"
    status: met
    evidence: "backup.schedule.yaml job mail-archiver-db-pgdump-daily enabled=true, backup.inventory.yaml unit app-mail-archiver registered"

  - id: overlap-assets-restored
    description: "Overlap cleanup capability scripts and alias boundary contract exist on disk."
    verification: "ls ops/plugins/communications/bin/communications-mail-archiver-overlap-plan ops/plugins/communications/bin/communications-mail-archiver-import-eml-remote ops/bindings/mail.archiver.alias.boundary.contract.yaml"
    acceptance: "All 3 files exist and are executable (scripts) or parseable (YAML)"
    status: pending
    note: "Assets restored in this wave; runtime validation deferred until VM214 SSH access"

  - id: no-active-import-jobs
    description: "No bulk import jobs running on VM 214."
    verification: "./bin/ops cap run communications.mailarchiver.import.status -- --json | jq '.data.import.state'"
    acceptance: "state != 'running'"
    status: met
    evidence: "All bulk imports complete: Gmail takeout (223631), Microsoft Graph (9087), EWS archive (68716)"


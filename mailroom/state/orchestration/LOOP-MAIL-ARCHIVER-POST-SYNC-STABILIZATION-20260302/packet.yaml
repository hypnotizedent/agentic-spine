    depends_on: []
    preconditions_required: [live-sync-stable, overlap-assets-restored]
    capability_ref: communications.mailarchiver.overlap.plan

  - wave_id: W2
    objective: "Overlap strict-dedupe execution with governed receipts"
    subagents: [overlap-executor]
    depends_on: [W1]
    preconditions_required: [no-active-import-jobs, db-backup-governed]
    approval_required: true
    note: "Manual approval required before any mutation"

  - wave_id: W3
    objective: "Post-cleanup verification and gap closeout"
    subagents: [verifier]
    depends_on: [W2]
    verification_commands:
      - "./bin/ops cap run communications.mailarchiver.import.status -- --json"
      - "./bin/ops cap run verify.pack.run communications"


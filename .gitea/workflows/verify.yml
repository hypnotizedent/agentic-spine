name: Spine Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lean-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Lean budget check
        run: ./ops/plugins/verify/bin/lean-budget-check --base-ref origin/main
        env:
          SPINE_ROOT: ${{ github.workspace }}
          SPINE_REPO: ${{ github.workspace }}

      - name: Verify fast
        run: ./ops/plugins/verify/bin/verify-run fast
        env:
          SPINE_ROOT: ${{ github.workspace }}
          SPINE_REPO: ${{ github.workspace }}

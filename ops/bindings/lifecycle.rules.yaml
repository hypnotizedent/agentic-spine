# Lifecycle Rules — Authoritative SSOT for gap/loop lifecycle defaults
#
# Consumed by: ops/plugins/lifecycle/lib/lifecycle-rules.sh
# Validated by: D136 (lifecycle-hygiene)
#
# Status: authoritative
# Last reviewed: 2026-02-17

version: "1.1"
updated_at: "2026-03-03"
owner: "@ronny"

rules:
  gap_quick:
    default_type: agent-behavior
    default_severity: medium
    default_discovered_by: "agent-session"

  aging:
    thresholds:
      warning_days: 7
      critical_days: 14

  loops_auto_close:
    enabled: true
    require_all_gaps_resolved: true
    skip_zero_gap_loops: true

  linkage:
    parent_loop:
      required_for_statuses: [open, accepted]
      advisory_for_statuses: [closed, fixed]

  health:
    orphan_check: true
    aging_advisory: true

  mutation_safety:
    yaml_edit_race:
      description: |
        Pre-commit hooks (Guard 5 schema audit, Guard 6 projection sync) may
        modify YAML binding files between an agent Read and Edit operation.
        This causes 'File has been modified since read' failures.
      mitigation: retry_after_reread
      affected_files:
        - ops/bindings/operational.gaps.yaml
        - ops/bindings/gate.registry.yaml
      guidance: |
        When editing affected YAML files, agents should:
        1. Read the file immediately before the Edit call.
        2. If Edit fails with modification error, re-read and retry once.
        3. Avoid back-to-back Edit calls on the same file without re-reading.
        4. Use gaps.file/gaps.close capabilities instead of direct YAML editing
           when possible (they handle locking internally).

version: 1
updated: "2026-03-05"
owner: "@ronny"
status: authoritative
scope: spine-lean-reset

thresholds:
  active_gates_max: 120
  blocking_fast_gates_max: 25
  verify_files_max: 80
  bindings_files_max: 180
  governance_docs_max: 35
  legacy_scripts_max: 0

canonical_docs:
  root: docs/governance/SPINE.md
  domains_dir: docs/governance/domains
  required_domains:
    - aof
    - backup
    - communications
    - core
    - finance
    - home
    - hygiene-weekly
    - immich
    - infra
    - loop_gap
    - media
    - microsoft
    - mint
    - n8n
    - observability
    - proxmox-network
    - rag
    - secrets
    - surveillance
    - tax-legal
    - workbench

paths:
  gate_registry: ops/bindings/gate.registry.yaml
  gate_topology: ops/bindings/gate.execution.topology.yaml
  verify_root: surfaces/verify
  bindings_root: ops/bindings
  governance_root: docs/governance
  plugins_root: ops/plugins

change_budget:
  file_classes:
    - class: verify
      prefix: surfaces/verify/
      max_net_new: 0
    - class: governance
      prefix: docs/governance/
      max_net_new: 0
    - class: bindings
      prefix: ops/bindings/
      max_net_new: 0
  gate_add_requires_retire_ratio: 2

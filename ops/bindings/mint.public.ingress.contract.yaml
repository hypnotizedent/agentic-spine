  - id: stripe-webhook
    public_surface: https://api.mintprints.com/api/v1/payments/webhooks/stripe
    hostname: api.mintprints.com
    path_scope: /api/v1/payments/webhooks/stripe
    class: provider_webhook
    runtime_owner_service: payment
    backend_target: http://payment:4000
    private_dependency_chain:
      - finance-adapter
      - mint-modules-postgres
    provider_registration_required: true
    provider_name: stripe
    provider_registration_capability: mint.public.providers.reconcile
    provider_expected_events:
      - checkout.session.completed
      - checkout.session.expired
      - payment_intent.payment_failed
      - payment_intent.succeeded
    canonical_secret_paths:
      - /spine/services/payment/PAYMENT_STRIPE_SECRET_KEY
      - /spine/services/payment/PAYMENT_STRIPE_WEBHOOK_SECRET
    runtime_env_mappings:
      - source: PAYMENT_STRIPE_SECRET_KEY
        target: STRIPE_SECRET_KEY
      - source: PAYMENT_STRIPE_WEBHOOK_SECRET
        target: STRIPE_WEBHOOK_SECRET
      - source: PAYMENT_CHECKOUT_SUCCESS_URL
        target: CHECKOUT_SUCCESS_URL
      - source: PAYMENT_CHECKOUT_CANCEL_URL
        target: CHECKOUT_CANCEL_URL
    deploy_mapping:
      stack_id: mint-apps-payment
      compose_service: payment
    canary:
      method: POST
      url: https://api.mintprints.com/api/v1/payments/webhooks/stripe
      expect_status: [400]


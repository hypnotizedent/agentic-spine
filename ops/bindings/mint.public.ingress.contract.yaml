version: 1
updated_at: "2026-03-08"
owner: "@ronny"
scope: mint-public-ingress

network_model:
  public_edge:
    provider: cloudflare_tunnel
    tunnel_name: homelab-tunnel
    canonical_runtime_plane: mint-apps
    canonical_entry_service: public-ingress
    canonical_backend_target: http://100.79.183.14:8080
    policy: "Canonical customer UX and provider webhook ingress terminates on mint-apps public-ingress; retained operator tools may publish direct tunnel targets when their runtime plane is not privately reachable from mint-apps."
  private_runtime_network:
    provider: tailscale
    policy: "Private operator/runtime access only. Never canonical public provider ingress."
  private_state_plane:
    runtime_plane: mint-data
    policy: "State plane only. No direct public app/provider ingress."
  retained_private_planes:
    - plane: finance-stack
      policy: "Operator/public tools may remain owned here and may publish direct Cloudflare tunnel targets when mint-apps cannot privately reach the runtime."


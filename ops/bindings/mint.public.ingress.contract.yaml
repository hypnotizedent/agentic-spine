flows:
  - id: quote-form
    public_surface: https://mintprints.com/quote
    hostname: mintprints.com
    path_scope: /quote
    class: customer_ux
    runtime_owner_service: quote-page
    backend_target: http://quote-page:3341
    private_dependency_chain:
      - files-api
      - mint-modules-postgres
      - mint-modules-minio
    provider_registration_required: false
    canonical_secret_paths: []
    runtime_env_mappings: []
    deploy_mapping:
      stack_id: mint-apps
      compose_service: public-ingress
    canary:
      method: GET
      url: https://mintprints.com/quote
      expect_status: [200]

  - id: quote-submit
    public_surface: https://mintprints.com/quote/submit
    hostname: mintprints.com

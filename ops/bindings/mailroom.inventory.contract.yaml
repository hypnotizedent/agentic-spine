# Mailroom Inventory Contract
#
# Classifies mailroom surfaces into authority/projection/runtime/ephemeral tiers.
# Decision: LOOP-MAILROOM-2-0-PLANS-LIFECYCLE-CANONICAL-FIX-20260303

version: "1.0"
updated_at: "2026-03-03"
owner: "@ronny"
scope: mailroom-inventory-classification

categories:
  authority:
    description: Canonical runtime authority sources.
    paths:
      - mailroom/state/shared_authority.db

  projection:
    description: Generated/read-optimized projections from authority state.
    paths:
      - mailroom/state/plans/index.yaml
      - mailroom/state/plans/PLAN-*.md
      - mailroom/state/plans/_orphans/*.md

  runtime:
    description: Runtime queues/indexes consumed by orchestrators and workers.
    paths:
      - mailroom/state/path.claims.yaml
      - mailroom/state/traffic.index.yaml
      - mailroom/state/friction-queue.ndjson
      - mailroom/state/loop-scopes/*.scope.md
      - mailroom/outbox/proposals/**

  ephemeral:
    description: Session/temporary lifecycle artifacts.
    paths:
      - mailroom/state/sessions/**
      - mailroom/logs/**
      - mailroom/state/locks/**

policy:
  write_path_lock:
    enforce: true
    governed_projection_surfaces:
      - mailroom/state/plans/index.yaml
      - mailroom/state/plans/PLAN-*.md
    mutation_entrypoints:
      - planning.plans.create
      - planning.plans.promote
      - planning.plans.retire
      - planning.plans.cancel
      - planning.plans.reconcile
      - planning.plans.archive
      - state.shared.reconcile

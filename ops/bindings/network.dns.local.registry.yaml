# ────────────────────────────────────────────────────────────────────────────
# POPULATION RULES
# ────────────────────────────────────────────────────────────────────────────
population_rules:
  description: >
    Rules governing how and when Pi-hole Local DNS entries are created,
    updated, and removed.

  source_of_truth: "This registry file (network.dns.local.registry.yaml)"
  target: "Pi-hole Local DNS records (both home and shop instances)"

  sync_policy:
    method: "Capability-driven sync (network.dns.local.populate)"
    direction: "Registry → Pi-hole (one-way push)"
    conflict_resolution: "Registry wins; Pi-hole manual entries flagged as drift"
    frequency: "On-demand via capability; drift gate checks daily"

  entry_lifecycle:
    add: "Add hostname to this registry, then run sync capability"
    update: "Update IP in this registry, then run sync capability"
    remove: "Remove from this registry, then run sync to prune Pi-hole"
    verify: "Drift gate compares Pi-hole Local DNS against this registry"

  exclusions:
    - "Tailscale MagicDNS names (*.ts.net) are NOT registered in Pi-hole"
    - "Public DNS names (*.ronny.works, *.mintprints.com) are NOT registered here"
    - "DHCP dynamic clients are NOT registered (pool range 200-254)"

# ────────────────────────────────────────────────────────────────────────────
# PLANNED CAPABILITIES
# ────────────────────────────────────────────────────────────────────────────
planned_capabilities:
  - name: network.dns.local.populate
    description: "Sync .mint.local entries from this registry to Pi-hole Local DNS"
    safety: mutating
    approval: manual
    status: planned

  - name: network.dns.local.status
    description: "Report parity between this registry and Pi-hole Local DNS"
    safety: read-only
    approval: auto
    status: planned

# ────────────────────────────────────────────────────────────────────────────
# PROPOSED GATE
# ────────────────────────────────────────────────────────────────────────────
proposed_gates:
  - id: D341
    name: netsec-pihole-drift-lock
    description: "Enforce Pi-hole Local DNS parity with this registry, upstream DNS config, DHCP DNS handout"
    mode: report

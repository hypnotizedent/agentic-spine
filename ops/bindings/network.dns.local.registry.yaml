# ═══════════════════════════════════════════════════════════════════════════
# DNS Local Name Registry (.mint.local)
# ═══════════════════════════════════════════════════════════════════════════
# Defines the .mint.local naming convention for internal services and
# governs how Pi-hole Local DNS entries are populated and maintained.
#
# Source plan: PLAN-NETWORK-SECURITY-OPS-WORKER-20260303
# Parent loop: LOOP-NETWORK-SECURITY-OPS-WORKER-SPEC-20260303
# Linked gap: GAP-OP-1451 (.mint.local naming)
# ═══════════════════════════════════════════════════════════════════════════

contract_id: NETWORK_DNS_LOCAL_REGISTRY_V1
version: "1.0"
status: planned
created: "2026-03-03"
owner: "@ronny"

description: >
  The .mint.local domain is the internal naming convention for all
  self-hosted services accessible on the LAN. Pi-hole Local DNS is
  the authoritative source for these records. This registry defines
  the naming convention, service-to-hostname mapping, and population
  rules for maintaining the local DNS zone.

# ────────────────────────────────────────────────────────────────────────────
# NAMING CONVENTION
# ────────────────────────────────────────────────────────────────────────────
naming_convention:
  domain_suffix: ".mint.local"
  format: "<service-name>.mint.local"
  rules:
    - "Service names use lowercase kebab-case"
    - "Names match the docker compose service name or VM hostname where possible"
    - "Multi-instance services append site suffix: <service>-home.mint.local, <service>-shop.mint.local"
    - "Infrastructure services use role name: pihole-home.mint.local, pve-shop.mint.local"
    - "Coordinator devices use device ID: slzb-06.mint.local"
    - "No underscores, no camelCase, no numeric-only prefixes"

  reserved_prefixes:
    - prefix: "gw-"
      purpose: "Gateway devices (gw-home.mint.local, gw-shop.mint.local)"
    - prefix: "pve-"
      purpose: "Proxmox hypervisors (pve-home.mint.local, pve-shop.mint.local)"
    - prefix: "pihole-"
      purpose: "Pi-hole instances (pihole-home.mint.local, pihole-shop.mint.local)"
    - prefix: "nas-"
      purpose: "Storage appliances (nas-shop.mint.local)"


# ═══════════════════════════════════════════════════════════════════════════
# Honeypot Deployment Contract
# ═══════════════════════════════════════════════════════════════════════════
# Governs Cowrie SSH/Telnet honeypot deployment, DMZ VLAN placement,
# log routing, and threat intelligence collection.
#
# Source plan: PLAN-NETWORK-SECURITY-OPS-WORKER-20260303
# Parent loop: LOOP-NETWORK-SECURITY-OPS-WORKER-SPEC-20260303
# Linked gap: GAP-OP-1459 (honeypot deployment)
# ═══════════════════════════════════════════════════════════════════════════

contract_id: NETWORK_HONEYPOT_V1
version: "1.0"
status: planned
created: "2026-03-03"
owner: "@ronny"

description: >
  Cowrie is a medium-interaction SSH/Telnet honeypot that logs brute-force
  attacks, shell interaction, and malware downloads. Deployed on the DMZ
  VLAN to attract and observe attackers without exposing real infrastructure.
  Captures feed into CrowdSec and the observability stack.

# ────────────────────────────────────────────────────────────────────────────
# DEPLOYMENT SPECIFICATION
# ────────────────────────────────────────────────────────────────────────────
deployment:
  platform: "Docker (cowrie/cowrie:latest)"
  host: "Dedicated LXC or VM on DMZ VLAN"
  vlan: dmz
  vlan_id: 50

  network:
    home:
      ip: "10.0.50.10"
      ports:
        - "22/tcp (SSH honeypot, masquerading as real SSH)"
        - "23/tcp (Telnet honeypot)"
        - "2222/tcp (Cowrie actual listen port, NAT from 22)"
    shop:
      status: blocked

  container_config:
    image: "cowrie/cowrie:latest"
    restart_policy: "unless-stopped"
    volumes:
      - "cowrie-data:/cowrie/cowrie-git/var"
      - "cowrie-log:/cowrie/cowrie-git/var/log/cowrie"
    environment:
      COWRIE_TELNET_ENABLED: "true"
      COWRIE_OUTPUT_JSON: "true"
    resource_limits:
      memory: "256M"
      cpus: "0.5"

# ────────────────────────────────────────────────────────────────────────────
# COWRIE CONFIGURATION
# ────────────────────────────────────────────────────────────────────────────
cowrie_config:
  hostname: "svr-prod-01"
  ssh:
    listen_port: 2222
    version: "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6"
    enabled_algorithms:
      - "diffie-hellman-group14-sha256"
      - "ecdh-sha2-nistp256"
      - "ssh-rsa"
      - "ssh-ed25519"
  telnet:
    listen_port: 2223
    enabled: true

  interaction:
    mode: "medium"
    description: >
      Medium interaction: Cowrie emulates a shell environment, responds
      to common commands (ls, cat, wget, curl), and logs all interaction.
      Does NOT run actual commands or provide real OS access.
    fake_filesystem: true
    download_capture: true
    download_path: "/cowrie/cowrie-git/var/lib/cowrie/downloads"

  credentials:
    description: >
      Cowrie accepts any username/password after a configurable number
      of failed attempts, simulating a weak system.
    accept_after_failures: 3
    log_all_attempts: true
    common_usernames:
      - "root"
      - "admin"
      - "ubuntu"
      - "pi"
      - "user"

# ────────────────────────────────────────────────────────────────────────────
# NETWORK ISOLATION (CRITICAL)
# ────────────────────────────────────────────────────────────────────────────
isolation:
  description: >
    The honeypot MUST be completely isolated from all internal VLANs.
    It runs on the DMZ VLAN with no ability to reach management, server,
    trusted, or IoT networks. Violation of this isolation is a critical
    security event.

  firewall_rules:
    - name: "DMZ → Internal (BLOCKED)"
      action: DENY
      source: "dmz VLAN (all)"
      destination: "management, servers, trusted, iot, guest"
      protocol: any
      description: "Honeypot cannot reach any internal network"

    - name: "DMZ → Internet (LIMITED)"
      action: ALLOW
      source: "dmz VLAN"
      destination: "internet"
      protocol: "TCP"
      destination_port: "443"
      description: "HTTPS outbound for threat intel upload to CrowdSec"

    - name: "Servers → DMZ (log pull)"
      action: ALLOW
      source: "observability VM"
      destination: "cowrie host"
      protocol: "TCP"
      destination_port: "514,9100"
      description: "Loki pulls syslog, Prometheus scrapes node-exporter"

  verification:
    test_from_cowrie: "ping 10.0.1.1 should FAIL (management gateway)"
    test_from_cowrie_2: "curl http://192.168.1.205 should FAIL (observability)"
    test_from_observability: "curl http://10.0.50.10:514 should SUCCEED (log pull)"

# ────────────────────────────────────────────────────────────────────────────
# LOG ROUTING AND INTELLIGENCE
# ────────────────────────────────────────────────────────────────────────────
log_routing:
  format: "JSON (Cowrie EVE-compatible)"
  primary_output:
    destination: "Loki (observability VM 192.168.1.205)"
    transport: "syslog forward or Promtail scrape"
    retention: "90 days"

  secondary_output:
    destination: "CrowdSec Security Engine"
    transport: "File-based log source or syslog"
    purpose: "Feed attacking IPs into CrowdSec decision engine"
    collection: "custom cowrie JSON parser"

  captured_data:
    - field: "src_ip"
      description: "Attacker source IP"
    - field: "username"
      description: "Attempted username"
    - field: "password"
      description: "Attempted password (logged for pattern analysis)"
    - field: "session_commands"
      description: "Commands executed in fake shell"
    - field: "downloads"
      description: "Malware payloads captured"
    - field: "session_duration"
      description: "Time spent in honeypot"

  intelligence_value:
    - "Attacker IP addresses for CrowdSec community sharing"
    - "Common credential pairs (trend analysis)"
    - "Malware sample collection"
    - "Attack pattern and tooling identification"
    - "Geographic origin mapping (via GeoIP in Grafana)"

# ────────────────────────────────────────────────────────────────────────────
# OBSERVABILITY DASHBOARDS
# ────────────────────────────────────────────────────────────────────────────
dashboards:
  grafana:
    - panel: "Cowrie Attack Map"
      description: "Geographic visualization of attacker IPs"
      data_source: "Loki (cowrie JSON logs)"

    - panel: "Credential Heatmap"
      description: "Most-attempted username/password combinations"
      data_source: "Loki (cowrie JSON logs)"

    - panel: "Session Activity"
      description: "Commands executed by attackers, session duration"
      data_source: "Loki (cowrie JSON logs)"

    - panel: "Malware Captures"
      description: "Downloaded files with SHA256 hashes"
      data_source: "Loki (cowrie JSON logs)"

    - panel: "Attack Volume Trend"
      description: "Attacks per hour/day over time"
      data_source: "Loki (cowrie JSON logs)"

# ────────────────────────────────────────────────────────────────────────────
# MALWARE HANDLING
# ────────────────────────────────────────────────────────────────────────────
malware_handling:
  capture: true
  storage: "/cowrie/cowrie-git/var/lib/cowrie/downloads"
  retention: "90 days"
  analysis:
    - "SHA256 hash logged on capture"
    - "Optional VirusTotal API lookup (if API key provisioned)"
    - "Samples stored locally only — not uploaded to any service by default"
  virustotal:
    status: planned
    api_key_location: "Infisical: /spine/vm-infra/network/VIRUSTOTAL_API_KEY"

# ────────────────────────────────────────────────────────────────────────────
# PLANNED CAPABILITIES
# ────────────────────────────────────────────────────────────────────────────
planned_capabilities:
  - name: network.honeypot.deploy
    description: "Deploy Cowrie honeypot on DMZ VLAN"
    safety: mutating
    approval: manual
    status: planned

  - name: network.honeypot.status
    description: "Report Cowrie capture stats, isolation health, log pipeline status"
    safety: read-only
    approval: auto
    status: planned

# ────────────────────────────────────────────────────────────────────────────
# DEPENDENCY
# ────────────────────────────────────────────────────────────────────────────
dependencies:
  - contract: NETWORK_VLAN_TOPOLOGY_V1
    requirement: "DMZ VLAN (ID 50) must exist before Cowrie deployment"
  - contract: NETWORK_CROWDSEC_V1
    requirement: "CrowdSec engine should be operational to consume Cowrie logs"

# ────────────────────────────────────────────────────────────────────────────
# PROPOSED GATE
# ────────────────────────────────────────────────────────────────────────────
proposed_gates:
  - id: D346
    name: netsec-honeypot-isolation-lock
    description: "Enforce Cowrie DMZ isolation (no RFC1918 egress to internal VLANs)"
    mode: report
    promote_to_enforce_after_clean_runs: 3

# Status: authoritative
# Last verified: 2026-03-03
# Scope: universal-intake-envelope-schema

version: 1
updated_at: "2026-03-03"
owner: "@ronny"
status: authoritative
scope: universal-intake-envelope-schema

schema:
  envelope_name_pattern: "^ITK-[0-9]{8}-[a-z0-9][a-z0-9-]*$"
  accepted_extensions:
    - ".yaml"
  required_fields:
    - intake_id
    - chain_step
    - domain_id
    - concern_id
    - authority_path
    - master_row_id
    - intake_mode
    - evidence_refs
    - requested_by
    - owner_agent
    - created_at
    - updated_at
  field_rules:
    intake_id:
      pattern: "^ITK-[0-9]{8}-[a-z0-9][a-z0-9-]*$"
    chain_step:
      enum: [intake]
    intake_mode:
      enum: [governed_capability, governed_yaml_envelope, governed_receipt_link]
    evidence_refs:
      type: list
      min_items: 1
    created_at:
      format: iso_8601
    updated_at:
      format: iso_8601

lineage_requirements:
  must_link_to_master_registry: true
  master_row_id_field: master_row_id
  authority_path_field: authority_path
  projection_contract_ref: ops/bindings/domain.projection.contract.yaml

legacy_compatibility:
  inventory_itk_envelopes:
    status: active
    source_gate: D183
    directory: mailroom/outbox/intake/
    description:
      - "Legacy inventory envelopes remain valid while universal schema is adopted."
      - "Legacy keys may be mapped to canonical fields by intake scaffolding capabilities."

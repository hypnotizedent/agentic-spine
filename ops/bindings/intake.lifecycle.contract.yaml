# Status: authoritative
# Last verified: 2026-03-03
# Scope: universal-intake-master-projection-chain
#
# Canonical 3-step chain for ALL domains:
#   1) intake
#   2) master registry
#   3) domain projection

version: 1
updated_at: "2026-03-03"
owner: "@ronny"
status: authoritative
scope: universal-intake-master-projection-chain

chain:
  required_order:
    - intake
    - master_registry
    - domain_projection
  enforce_strict_order: true
  allow_skips: false

domain_coverage:
  source_of_truth: ops/bindings/gate.execution.topology.yaml
  applies_to_domain_ids:
    - core
    - aof
    - secrets
    - infra
    - backup
    - workbench
    - loop_gap
    - home
    - media
    - immich
    - n8n
    - communications
    - finance
    - mint
    - microsoft
    - proxmox-network
    - observability
    - rag
    - surveillance
    - tax-legal
    - hygiene-weekly

contracts:
  intake_envelope_schema: ops/bindings/intake.envelope.schema.yaml
  master_registry: ops/bindings/master.inventory.registry.yaml
  projection_contract: ops/bindings/domain.projection.contract.yaml
  state_storage_policy: ops/bindings/state.storage.policy.yaml

intake_defaults:
  accepted_modes:
    - governed_capability
    - governed_yaml_envelope
    - governed_receipt_link
  intake_roots:
    - mailroom/outbox/intake/
    - mailroom/outbox/proposals/
  envelope_schema_ref: ops/bindings/intake.envelope.schema.yaml
  evidence_required: true

master_registry_defaults:
  required_fields:
    - id
    - domain_id
    - authority.path
    - intake_lineage.accepted_intake_refs
    - evidence_refs
    - projection_refs
  no_orphan_rows: true
  orphan_definition: "master row missing intake lineage and/or evidence_refs"

projection_defaults:
  generated_only: true
  manual_edit_policy: "forbidden"
  required_marker_contract:
    - projection_of OR source_capability
    - generated timestamp field
    - explicit generated-only note in file comment/body

legacy_supersession:
  canonical_pointer_index: ops/bindings/master.inventory.registry.yaml
  superseded_docs:
    - mailroom/outbox/intake/README.md
    - docs/governance/generated/W43_INVENTORY_INTAKE_UNION_LOCK_20260223.md

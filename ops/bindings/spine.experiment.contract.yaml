status: authoritative
owner: "@ronny"
last_verified: 2026-03-05
scope: spine-experiment-compare-contract

version: 1
updated_at: "2026-03-05"
decision_loop_id: "LOOP-SPINE-PORTABILITY-BOOTSTRAP-CANONICAL-UPGRADE-20260304"

authority:
  capability: spine.experiment.compare
  script: ops/plugins/evidence/bin/spine-experiment-compare
  runtime_data_sources:
    - receipts/sessions/*/receipt.exec.json
    - ops/plugins/verify/state/verify-failure-class-history.ndjson

inputs:
  required_flags: []
  optional_flags:
    - --baseline-start
    - --baseline-end
    - --candidate-start
    - --candidate-end
    - --prompt-set-id
    - --json
  default_windows:
    baseline: "24h window immediately preceding candidate window"
    candidate: "last 24h ending at current UTC timestamp"
  timestamp_format: "ISO-8601 UTC second precision (YYYY-MM-DDTHH:MM:SSZ)"

output:
  summary_fields:
    - capability
    - windows
    - delta
  windows_required_fields:
    - range
    - summary
    - verify
    - prompt_lineage
  delta_required_fields:
    - success_rate_delta
    - blocked_rate_delta
    - gate_pass_rate_delta
    - deterministic_failures_delta

metrics:
  run_health:
    - total_runs
    - done_runs
    - failed_runs
    - blocked_runs
    - success_rate
    - blocked_rate
  verify_health:
    - verify_runs
    - gate_total
    - gate_pass
    - gate_fail
    - gate_pass_rate
    - deterministic_failures
    - freshness_failures
    - gate_bug_failures
  prompt_lineage:
    - prompt_set_filter
    - considered_runs
    - versions

policy:
  compare_mode: "candidate_minus_baseline"
  empty_window_semantics: "rates return null when denominator is zero"

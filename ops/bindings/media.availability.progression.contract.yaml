owner: "@ronny"
authority_loop: LOOP-MEDIA-STACK-DISCONNECT-CANONICAL-TRACE-20260303
original_skeleton_loop: LOOP-MEDIA-SHOP-HOME-MIGRATION-CONNECTOR-20260303

description: |
  Canonical availability progression model for the media pipeline.
  Defines the authoritative state machine for media items as they traverse
  from request through download to library availability.
  Resolves the dual-truth problem where Radarr says hasFile=true but
  Jellyseerr says processing and Jellyfin has no library entry.

  Design principle: at every stage, exactly ONE system is the authority for
  whether the item has reached that stage. When two systems disagree about
  availability, the earlier-stage authority wins and the later-stage system
  must be reconciled to match.

  Runtime validation performed 2026-03-04 via SSH Tailscale probes:
  - 5-movie E2E sample: all 4 legs PASS (Radarr -> filesystem -> Jellyfin -> Jellyseerr)
  - Jellyseerr availability-sync, radarr-scan, sonarr-scan all triggered via jobs API
  - 62 processing requests identified (AVAIL-F2 pattern confirmed active)
  - Queue: 9 entries, 0 ghost (hasFile=true), 1 import-blocked, 2 downloadClientUnavailable


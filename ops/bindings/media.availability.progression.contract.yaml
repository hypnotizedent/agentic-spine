# Canonical state progression (single authority per stage)
progression_stages:
  - stage: requested
    order: 1
    authority: jellyseerr
    api_endpoint: "/api/v1/request/{id}"
    field: "status"
    pass_value: "1 (pending) or 2 (approved)"
    description: "User has requested media; no download initiated"
    failure_meaning: "Request was declined or does not exist"

  - stage: searching
    order: 2
    authority: radarr
    api_endpoint: "/api/v3/movie/{id}"
    field: "monitored + hasFile"
    pass_value: "monitored=true, hasFile=false"
    description: "ARR is actively searching for the title via indexers"
    failure_meaning: "Title is unmonitored or not added to ARR"

  - stage: downloading
    order: 3
    authority: radarr
    api_endpoint: "/api/v3/queue"
    field: "queue record exists for movieId"
    pass_value: "status=downloading, trackedDownloadStatus=ok"
    description: "Download client has an active transfer for this title"
    failure_meaning: "No queue record or download client unreachable"
    known_edge_cases:
      - "downloadClientUnavailable: client path mapping broke after import (see queue reconciliation policy)"
      - "warning status: download stalled or slow, may self-resolve"

  - stage: import_complete
    order: 4
    authority: radarr
    api_endpoint: "/api/v3/movie/{id}"
    field: "hasFile"
    pass_value: "hasFile=true"
    description: "File has been imported, renamed, and placed at the root folder path"
    failure_meaning: "Import failed; file may exist in download dir but not moved to library"
    verification_action: "Confirm file exists at movieFile.path via filesystem check"

  - stage: library_visible
    order: 5
    authority: jellyfin
    api_endpoint: "/Items?SearchTerm={title}&IncludeItemTypes=Movie"
    field: "TotalRecordCount > 0 with matching item"
    pass_value: "item exists in Jellyfin library with playable media source"
    description: "Jellyfin has scanned and indexed the file; item is searchable and playable"
    failure_meaning: "Library scan has not run or file path is not within a configured library root"
    sync_dependency: "arr_to_jellyfin handshake must complete first"

  - stage: request_fulfilled
    order: 6
    authority: jellyseerr
    api_endpoint: "/api/v1/request/{id}"
    field: "media.status"
    pass_value: "3 (available) or 4 (partially_available)"
    description: "Jellyseerr reflects downstream availability; request lifecycle is complete"
    failure_meaning: "Jellyseerr webhook/poll has not fired or Radarr integration is misconfigured"
    sync_dependency: "arr_to_jellyseerr handshake must complete first"

# Synchronization handshakes
sync_handshakes:
  arr_to_jellyfin:
    trigger: "Radarr hasFile transitions from false to true (import complete)"
    mechanism: "Autopulse webhook OR Jellyfin scheduled library scan"
    expected_action: "Jellyfin library scan picks up new file at NFS mount path"
    max_expected_delay_minutes: 15
    max_acceptable_delay_minutes: 30
    failure_mode: "File exists on disk but not in Jellyfin library"
    failure_causes:
      - "Jellyfin library root path does not match NFS mount point"
      - "Autopulse webhook misconfigured or down"
      - "Jellyfin scan interval too long or scan skipped due to lock"
      - "NFS mount on streaming-stack is stale or unmounted"
    reconciliation: "Trigger manual library scan; if still missing, verify Jellyfin library root includes the file path"
    gap_ref: GAP-OP-1392
    runtime_observation: |
      2026-03-04: 5/5 sampled movies present in Jellyfin. Handshake functional for existing library.
      Jellyfin recently-added scan runs every 5 min, full scan at 03:00 daily.

  arr_to_jellyseerr:
    trigger: "Radarr hasFile transitions from false to true"
    mechanism: "Jellyseerr polls Radarr API OR receives Radarr webhook"
    expected_action: "Jellyseerr updates request.media.status to available (3)"
    max_expected_delay_minutes: 10
    max_acceptable_delay_minutes: 60
    failure_mode: "Request remains status=processing while hasFile=true"
    failure_causes:
      - "Jellyseerr Radarr integration webhook not configured"
      - "Jellyseerr scan interval too long"
      - "TMDb ID mismatch between Jellyseerr request and Radarr movie"
      - "Radarr server URL or API key changed without updating Jellyseerr settings"
    reconciliation: "Trigger Jellyseerr sync from Settings > Radarr > Sync; if still stuck, check TMDb ID parity"
    gap_ref: GAP-OP-1389
    runtime_observation: |
      2026-03-04: 62 requests stuck in processing (AVAIL-F2 confirmed active).
      Availability-sync job triggered — check post-sync count to measure effectiveness.
      Radarr-scan and sonarr-scan also triggered. Scheduled jobs exist but only run at
      04:00/04:30/05:00 daily — any media imported between daily scans stays in processing
      until the next scheduled run.

  queue_to_hasfile:
    trigger: "hasFile=true for a title that still has a queue entry"
    mechanism: "Radarr queue refresh should clear completed/orphaned entries"
    expected_action: "Queue entry removed or marked completed"
    max_expected_delay_minutes: 5
    max_acceptable_delay_minutes: 15
    failure_mode: "Ghost queue items remain with downloadClientUnavailable status"
    failure_causes:
      - "Download client path mapping changed after import"
      - "Download client was restarted and lost session tracking"
      - "Radarr remote path mapping does not match current download client config"
    reconciliation: "See ops/bindings/media.queue.reconciliation.policy.yaml"
    gap_ref: GAP-OP-1390
    runtime_observation: |
      2026-03-04: 0 ghost entries found (hasFile=true + in queue). AVAIL-F3 NOT active.
      2 downloadClientUnavailable entries exist but both have hasFile=false (pending downloads).
      1 import-blocked entry (St Trinians 2) — warning status, not a ghost.

# Failure taxonomy
failure_taxonomy:
  - id: AVAIL-F1
    symptom: "hasFile=true but Jellyfin has no entry"
    root_cause_class: scan_propagation
    affected_stages: [import_complete, library_visible]
    handshake: arr_to_jellyfin
    operator_action: "Verify filesystem path, trigger Jellyfin scan, check library root config"
    runtime_status: "NOT_OBSERVED in 5-sample check (2026-03-04)"

  - id: AVAIL-F2
    symptom: "hasFile=true but Jellyseerr says processing"
    root_cause_class: status_propagation
    affected_stages: [import_complete, request_fulfilled]
    handshake: arr_to_jellyseerr
    operator_action: "Trigger Jellyseerr sync, check TMDb ID parity"
    runtime_status: "ACTIVE — 62 processing requests (2026-03-04)"

  - id: AVAIL-F3
    symptom: "hasFile=true but queue entry still active"
    root_cause_class: queue_orphan
    affected_stages: [import_complete, downloading]
    handshake: queue_to_hasfile
    operator_action: "Apply queue reconciliation policy (auto-remove safe for hasFile=true)"
    runtime_status: "NOT_OBSERVED — 0 ghost entries (2026-03-04)"

  - id: AVAIL-F4
    symptom: "Jellyfin has entry but file is missing from disk"
    root_cause_class: storage_drift
    affected_stages: [library_visible, import_complete]
    handshake: null
    operator_action: "Check NFS mount health, verify file was not moved/deleted, re-download if needed"
    runtime_status: "NOT_TESTED (would require full library scan)"

  - id: AVAIL-F5
    symptom: "Jellyseerr says available but Jellyfin has no entry"
    root_cause_class: stale_status
    affected_stages: [request_fulfilled, library_visible]
    handshake: arr_to_jellyfin
    operator_action: "Jellyseerr status is stale; fix Jellyfin visibility first, then resync Jellyseerr"
    runtime_status: "NOT_TESTED"

# Verification integration
verification:
  e2e_check_chain:
    description: |
      An end-to-end availability check must verify the FULL chain for a
      given title. Checking only hasFile=true is insufficient (GAP-OP-1392).
    legs:
      - leg: 1
        check: "Radarr/Sonarr hasFile=true"
        api: "/api/v3/movie/{id}"
        pass_if: "hasFile=true"
      - leg: 2
        check: "File exists on filesystem at movieFile.path"
        method: "SSH + stat on download-stack"
        pass_if: "file exists and size > 0"
      - leg: 3
        check: "Jellyfin library contains the item"
        api: "/Items?SearchTerm={title}&IncludeItemTypes=Movie"
        pass_if: "TotalRecordCount > 0 with matching provider ID"
      - leg: 4
        check: "Jellyseerr request shows available status"
        api: "/api/v1/request/{id}"
        pass_if: "media.status in [3, 4]"
    verdict: "PASS only when all 4 legs pass; any failure reports the specific broken handshake"
    spec_ref: "ops/bindings/media.e2e.verification.spec.yaml"
    runtime_result: |
      2026-03-04 manual sample: Legs 1-3 PASS for 5 movies. Leg 4 not testable for
      pre-Jellyseerr items. E2E chain functional for established library content.
      media.e2e.verify capability FAILS due to SSH tunnel limitation (cannot reach
      Radarr API directly from macOS — needs SSH proxy or on-VM execution).

  drift_gate: TBD
  verification_command: "media.e2e.verify"
  verification_command_status: |
    Capability exists but FAILS at runtime — cannot reach Radarr/Jellyfin APIs
    from macOS. Script attempts direct HTTP to Tailscale IPs which times out.
    Fix: rewrite to use SSH tunnel or execute on-VM via SSH.
    Tracked by: GAP-OP-1392 (E2E verification blind spot)


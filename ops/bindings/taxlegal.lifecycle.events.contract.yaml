# Tax-Legal Lifecycle Events Contract
# Status: planned (Wave 1 design-only)
# Gap: GAP-OP-1441
# Loop: LOOP-TAXLEGAL-W1-BUSINESS-LIFECYCLE-PLAYBOOKS-20260303
# Plan: PLAN-TAX-LEGAL-OPS-WORKER-20260303

contract_id: TAXLEGAL_LIFECYCLE_EVENTS_V1
version: "1.0"
lifecycle: experimental
created: "2026-03-03"
owner: "@ronny"
scope: taxlegal-lifecycle-events

description: >
  Business lifecycle event taxonomy for tax-legal operations. Covers the
  full arc from entity formation through dissolution, with mandatory
  evidence requirements at each stage. Maps lifecycle events to case types
  and jurisdiction-specific requirements.

authority_references:
  agent_contract: ops/agents/tax-legal-agent.contract.md
  case_lifecycle: ops/bindings/taxlegal.case.lifecycle.contract.yaml
  jurisdiction_profile: ops/bindings/taxlegal.jurisdiction.profile.33441.yaml
  playbook: docs/governance/domains/tax-legal/BUSINESS_LIFECYCLE_PLAYBOOK.md

# ────────────────────────────────────────────────────────────────────────────
# LIFECYCLE STAGES
# ────────────────────────────────────────────────────────────────────────────
lifecycle_stages:
  - id: formation
    description: "Entity formation and initial compliance setup"
    case_type: formation
    event_types:
      - llc_articles_filing
      - ein_application
      - registered_agent_designation
      - operating_agreement_draft
      - initial_tax_elections
      - initial_state_registrations
    mandatory_evidence:
      - articles_of_organization_receipt
      - ein_confirmation_letter
      - registered_agent_acceptance
    jurisdiction_layers:
      - federal
      - florida_state
      - local (if home occupation or physical location)

  - id: amendment
    description: "Address changes, registered agent updates, and entity amendments"
    case_type: address_amendment
    event_types:
      - principal_address_change
      - mailing_address_change
      - registered_agent_change
      - member_manager_change
      - name_amendment
      - articles_amendment
    mandatory_evidence:
      - amendment_filing_receipt
      - updated_registration_confirmation
    amendment_sequencing:
      - "State amendment must be filed before local license updates"
      - "IRS address change (Form 8822-B) required for federal records"
      - "Registered agent change requires both state filing and agent acceptance"

  - id: local_compliance
    description: "Home occupation permits, city/county BTR, zoning compatibility"
    case_type: local_compliance
    event_types:
      - home_occupation_permit_application
      - business_tax_receipt_application
      - business_tax_receipt_renewal
      - zoning_compatibility_check
      - fire_inspection_compliance
    mandatory_evidence:
      - permit_or_receipt_confirmation
      - zoning_compatibility_letter (if required)
    jurisdiction_layers:
      - broward_county
      - deerfield_beach

  - id: enforcement_remediation
    description: "Code enforcement or zoning notice response"
    case_type: enforcement_remediation
    event_types:
      - notice_received
      - response_drafted
      - corrective_action_planned
      - corrective_action_completed
      - case_closure_confirmed
    mandatory_evidence:
      - original_notice_copy
      - response_sent_receipt
      - corrective_action_evidence
      - closure_confirmation
    escalation_contract: ops/bindings/taxlegal.enforcement.response.contract.yaml
    timeline_requirements:
      - "Response must be drafted within escalation window from notice date"
      - "Corrective action timeline per notice requirements"

  - id: ongoing_compliance
    description: "Annual reports, recurring filings, and deadline cadence"
    case_type: ongoing_compliance
    event_types:
      - annual_report_filing
      - quarterly_tax_filing
      - sales_tax_filing
      - license_renewal
      - periodic_compliance_review
    mandatory_evidence:
      - filing_receipt_or_confirmation
      - payment_confirmation (if applicable)
    deadline_contract: ops/bindings/taxlegal.deadline.contract.yaml

  - id: closure
    description: "Entity dissolution and compliance closeout"
    case_type: closure
    event_types:
      - dissolution_vote_or_decision
      - final_tax_returns
      - state_dissolution_filing
      - local_license_cancellation
      - account_closures
      - record_retention_activation
    mandatory_evidence:
      - dissolution_articles_receipt
      - final_tax_return_receipts
      - license_cancellation_confirmations
      - account_closure_confirmations
    closeout_checklist:
      - "File final federal tax return with dissolution checkbox"
      - "File final Florida tax returns"
      - "File Articles of Dissolution with Florida DOS"
      - "Cancel all local licenses and permits"
      - "Close business bank accounts"
      - "Activate retention policy for all case artifacts"
      - "Notify registered agent of dissolution"

# ────────────────────────────────────────────────────────────────────────────
# EVENT METADATA SCHEMA
# ────────────────────────────────────────────────────────────────────────────
event_metadata:
  required_fields:
    - event_id
    - event_type
    - lifecycle_stage
    - case_id
    - occurred_at
    - evidence_path
  optional_fields:
    - jurisdiction
    - agency
    - deadline_id
    - source_id
    - operator_note

# ────────────────────────────────────────────────────────────────────────────
# CROSS-STAGE RULES
# ────────────────────────────────────────────────────────────────────────────
cross_stage_rules:
  - rule: formation_before_compliance
    description: "Entity must be in formed state before local compliance events"
    enforcement: planned_gate

  - rule: amendment_preserves_compliance
    description: "Amendments must trigger review of downstream compliance requirements"
    enforcement: planned_gate

  - rule: closure_requires_all_filings_current
    description: "Dissolution cannot proceed with overdue filings or open enforcement cases"
    enforcement: planned_gate

  - rule: evidence_chain_required
    description: "Every lifecycle event must have at least one evidence artifact"
    enforcement: planned_gate

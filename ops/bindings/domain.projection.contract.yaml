# Status: authoritative
# Last verified: 2026-03-03
# Scope: universal-domain-projection-contract

version: 1
updated_at: "2026-03-05"
owner: "@ronny"
status: authoritative
scope: universal-domain-projection-contract

contracts:
  intake_lifecycle: ops/bindings/intake.lifecycle.contract.yaml
  master_registry: ops/bindings/master.inventory.registry.yaml
  storage_policy: ops/bindings/state.storage.policy.yaml

policy:
  generated_only_enforced: true
  projection_generated_only_discipline:
    manual_edits_forbidden: true
    require_lineage_marker: true
    require_generator_identity: true
  lineage_enforced: true
  snapshot_writepath_policy:
    default_mode: check
    apply_flag: --apply
    runtime_state_root: runtime/domain-state/snapshots/
    no_write_on_read: true
    tracked_projection_bindings:
      - ops/bindings/ha.inventory.snapshot.yaml
      - ops/bindings/home.dhcp.audit.yaml
      - ops/bindings/media.content.snapshot.yaml
      - ops/bindings/network.inventory.snapshot.yaml
      - ops/bindings/z2m.devices.yaml

projections:
  - id: projection.internet_asset.registry.projected
    domain_id: infra
    source_master_rows:
      - authority.internet_asset.registry
      - authority.hardware.inventory
    output_path: ops/bindings/internet.asset.registry.projected.yaml
    generator_capability: internet.asset.registry.build
    generated_only: true
    required_markers:
      - key: projection_of
        equals: ops/bindings/internet.asset.registry.yaml
      - key: authority_state
        equals: projection
      - key: generated_at_utc
        presence: required

  - id: projection.network.unifi.home.clients.observed
    domain_id: home
    source_master_rows:
      - authority.device_identity.ssot
    output_path: ops/bindings/network.unifi.home.clients.observed.yaml
    generator_capability: network.home.unifi.clients.snapshot
    generated_only: true
    required_markers:
      - key: source_capability
        equals: network.home.unifi.clients.snapshot
      - key: generated_at
        presence: required

  - id: projection.network.unifi.shop.clients.observed
    domain_id: infra
    source_master_rows:
      - authority.device_identity.ssot
    output_path: ops/bindings/network.unifi.shop.clients.observed.yaml
    generator_capability: network.unifi.clients.snapshot
    generated_only: true
    required_markers:
      - key: source_capability
        equals: network.unifi.clients.snapshot
      - key: generated_at
        presence: required

  - id: projection.ha.device.map
    domain_id: home
    source_master_rows:
      - authority.home.device.registry
      - authority.network.unifi.home.clients.observed
      - authority.network.unifi.shop.clients.observed
      - authority.device_identity.ssot
    output_path: ops/bindings/ha.device.map.yaml
    generator_capability: ha.device.map.build
    generated_only: true
    required_markers:
      - key: source
        equals: ha.device.map.build
      - key: generated
        presence: required
    required_comment_markers:
      - "Auto-generated by ha.device.map.build"
      - "do not hand-edit"

  - id: projection.ha.inventory.snapshot
    domain_id: home
    source_master_rows:
      - authority.ha.device.map
    output_path: ops/bindings/ha.inventory.snapshot.yaml
    generator_capability: ha-inventory-snapshot-build
    generated_only: true
    required_markers:
      - key: source_capability
        equals: ha-inventory-snapshot-build
      - key: generated_at
        presence: required

  - id: projection.taxlegal.case.status
    domain_id: tax-legal
    source_master_rows:
      - authority.taxlegal.case.registry
    output_path: ops/bindings/taxlegal.paperless.binding.contract.yaml
    generator_capability: taxlegal-source-ingest
    generated_only: true
    required_markers:
      - key: contract_id
        presence: required

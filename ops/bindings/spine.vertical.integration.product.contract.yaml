# Status: draft
# Last verified: 2026-03-03
# Scope: spine-product-vertical-integration
#
# Product intent:
# "No surface-level completion." Every new organ must be integrated end-to-end
# before the spine can declare it active/complete.

version: 1
updated_at: "2026-03-03"
owner: "@ronny"
status: draft
scope: spine-product-vertical-integration

problem_statement:
  summary: >
    Spine currently over-indexes on registration/closure mechanics and under-indexes
    on vertical integration completion. This contract inverts that by making
    implementation and runtime certification mandatory for activation/closure.
  anti_pattern_to_eliminate:
    - "Contract added, capability stubbed, runtime left not_started/script:null."
    - "Filesystem artifacts created without same-commit registry parity."
    - "Loop or gap closure without operational runtime proof."

chain_contracts:
  intake_lifecycle: ops/bindings/intake.lifecycle.contract.yaml
  master_registry: ops/bindings/master.inventory.registry.yaml
  domain_projection: ops/bindings/domain.projection.contract.yaml
  state_storage_policy: ops/bindings/state.storage.policy.yaml

vertical_completion_model:
  required_stages_in_order:
    - detected
    - registered
    - contracted
    - implemented
    - integrated
    - operational
    - certified
  stage_requirements:
    detected:
      required_evidence:
        - "source signal (scan finding, operator intake, or runtime receipt)"
    registered:
      required_evidence:
        - "registry rows created for all new artifacts"
    contracted:
      required_evidence:
        - "authoritative contract paths linked from registry"
    implemented:
      required_evidence:
        - "no script:null capability for active surfaces"
        - "runtime implementation exists at declared path"
    integrated:
      required_evidence:
        - "routing/dispatch integrated"
        - "health/verify hooks integrated"
    operational:
      required_evidence:
        - "governed capability succeeds with run-keyed receipt"
        - "reconcile path exists and executes"
    certified:
      required_evidence:
        - "relevant fast/domain verify gates pass"
        - "regression lock or equivalent invariant guard exists"

activation_policy:
  main_branch_blockers:
    - id: block-registry-delta
      condition: "filesystem artifacts exist without same-commit registry parity"
      severity: P0
    - id: block-script-null-active
      condition: "active capability entry has script:null or not_started implementation"
      severity: P0
    - id: block-subsystem-under-mature
      condition: "subsystem status=active with maturity score < 8/8"
      severity: P1
    - id: block-no-reconcile
      condition: "new subsystem lacks reconcile capability/scheduled reconciliation path"
      severity: P1
  exception_policy:
    allowed: true
    required_fields:
      - approved_by
      - reason
      - expires_at
      - rollback_plan
    default_ttl_days: 7

subsystem_maturity_template:
  score_model: "8_of_8 required for status=active"
  dimensions:
    - contract_authority
    - capability_crud
    - runtime_implementation
    - verify_gate_coverage
    - locking_atomicity
    - reconcile_automation
    - receipt_lineage
    - drift_prevention_register_at_creation

register_at_creation:
  policy: fail_closed
  scanners_required:
    - id: gate.scan
      source_glob: "surfaces/verify/d*.sh"
      registry_path: ops/bindings/gate.registry.yaml
    - id: cap.scan
      source_glob: "ops/plugins/*/bin/*"
      registry_path: ops/capabilities.yaml
    - id: agent.scan
      source_glob: "ops/agents/*.contract.md"
      registry_path: ops/bindings/agents.registry.yaml
    - id: launchd.scan
      source_glob: "ops/runtime/launchd/*.plist"
      registry_path: ops/bindings/launchd.scheduler.registry.yaml
    - id: binding.scan
      source_glob: "ops/bindings/*.yaml"
      registry_path: docs/governance/_index.yaml
    - id: plan.scan
      source_glob: "mailroom/state/plans/*.md"
      registry_path: mailroom/state/plans/index.yaml
    - id: mcp.scan
      source_glob: ".mcp.json,*/.mcp.json"
      registry_path: ops/bindings/mcp.runtime.contract.yaml
  required_outputs:
    - "zero unregistered artifacts OR blocking failure"
    - "auto-filed proposal for each missing registration when run in non-blocking mode"

shared_state_authority:
  canonical_backend:
    high_churn_shared_mutation: sqlite
    declarative_contracts: yaml
    generated_projections: yaml
  sqlite_candidates:
    - operational_gaps
    - loop_index
    - plans_index
    - friction_queue
    - path_claims
    - traffic_index
  projection_requirements:
    - "sqlite -> YAML projection parity check required"
    - "projection drift gates required in fast/domain verify surfaces"

closure_policy:
  loops:
    close_allowed_only_if:
      - "targeted organs are certified in vertical_completion_model"
      - "linked open gaps are either fixed or explicitly blocked with owner + next_action + review date"
  gaps:
    fixed_allowed_only_if:
      - fixed_in
      - evidence_run_keys
      - regression_lock_or_equivalent
  proposals:
    apply_allowed_only_if:
      - "vertical impact statement present"
      - "required scanners report no register-at-creation delta"

delivery_phases:
  - id: P1
    name: stop-the-bleeding
    outcomes:
      - "implement blocking register-at-creation scanner diffs"
      - "ban active script:null capabilities"
  - id: P2
    name: shared-state-hardening
    outcomes:
      - "migrate high-churn shared mutation surfaces to sqlite authority"
      - "keep YAML projection read surfaces with parity gates"
  - id: P3
    name: autonomous-self-growth
    outcomes:
      - "scheduled scanner family runs"
      - "auto-proposal generation for missing registrations"

success_metrics:
  - id: vertical_completion_rate
    target: ">=95% of new organs reach certified within same execution wave"
  - id: script_null_active_count
    target: 0
  - id: unregistered_artifact_count
    target: 0
  - id: closure_without_runtime_proof
    target: 0

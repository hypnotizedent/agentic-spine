# Status: active
# Authority: LOOP-MEDIA-RUNTIME-REPAIR-20260303
# Created by: DOMAIN-MEDIA-01 Lane B (media trace normalization)
# Addresses: GAP-OP-1392 (E2E verification blind spot)
# Runtime capability: media.e2e.verify (implemented)

contract: MEDIA_E2E_VERIFICATION_SPEC_V1
version: "1.1"
status: active
created: "2026-03-03"
updated_at: "2026-03-03"
owner: "@ronny"
authority_loop: LOOP-MEDIA-STACK-DISCONNECT-CANONICAL-TRACE-20260303

description: |
  End-to-end media availability verification specification.
  Addresses the blind spot where hasFile=true is treated as sufficient proof
  of availability but does not verify filesystem presence, library scan
  propagation, or request fulfillment status (GAP-OP-1392).

  This spec defines the complete check chain, pass/fail criteria per leg,
  and integration points with the existing media verify pack.

# ─────────────────────────────────────────────────────────────────────────
# Problem Statement
# ─────────────────────────────────────────────────────────────────────────

problem:
  current_state: |
    Existing media health checks verify service availability (HTTP ping)
    and basic Radarr state (hasFile count). They do NOT verify that:
    1. Files actually exist on the filesystem at the declared path
    2. Jellyfin has indexed the file and can serve it
    3. Jellyseerr request status reflects the actual availability
    This creates false-green verification results where the operator
    believes all media is available but users cannot find or play titles.
  gap_ref: GAP-OP-1392
  affected_gates:
    - "D106 (media service health)"
    - "D107 (media port collision)"
    - "D240 (import list policy)"
    - "Future media availability gate (TBD)"
  progression_contract_ref: "ops/bindings/media.availability.progression.contract.yaml"

# ─────────────────────────────────────────────────────────────────────────
# Check Chain Definition
# ─────────────────────────────────────────────────────────────────────────

check_chain:
  description: |
    Four-leg verification chain. Each leg must independently pass for
    an item to be considered truly available. The chain runs in order
    but all legs are reported regardless of earlier failures.

  legs:
    - leg: 1
      id: arr_hasfile
      description: "Radarr/Sonarr reports hasFile=true for the title"
      target_vm: download-stack
      target_service: radarr
      api_endpoint: "/api/v3/movie/{id}"
      api_auth: "X-Api-Key header from Infisical"
      check_field: "hasFile"
      pass_criteria: "hasFile == true"
      fail_meaning: "ARR has not imported the file; download or import may have failed"
      fail_severity: critical
      detail: |
        This is the baseline check that currently exists. By itself it only
        proves that Radarr's database says a file exists, not that the file
        is physically present or that downstream systems are aware of it.

    - leg: 2
      id: filesystem_exists
      description: "File physically exists on disk at the path declared by Radarr"
      target_vm: download-stack
      method: "SSH + stat"
      check_command: "stat -c '%s' '{movieFile.path}'"
      pass_criteria: "exit code 0 AND file size > 0"
      fail_meaning: "Radarr database is stale; file was moved, deleted, or NFS mount is broken"
      fail_severity: critical
      depends_on: arr_hasfile
      detail: |
        The file path comes from Radarr's movieFile.path field. This leg
        verifies that the path is reachable from the download-stack VM
        where Radarr runs. Common failure: NFS mount /media/movies is
        unmounted or the file was removed outside of Radarr.

    - leg: 3
      id: jellyfin_indexed
      description: "Jellyfin library contains the item and can serve it"
      target_vm: streaming-stack
      target_service: jellyfin
      api_endpoint: "/Items"
      api_params:
        SearchTerm: "{title}"
        IncludeItemTypes: "Movie"
        Recursive: "true"
        Fields: "MediaSources,Path"
      api_auth: "X-Emby-Token header from Infisical"
      pass_criteria: "TotalRecordCount > 0 AND at least one item has matching provider ID (TMDb/IMDb)"
      fail_meaning: "Jellyfin has not scanned the file or library root path mismatch"
      fail_severity: high
      depends_on: filesystem_exists
      detail: |
        Search by title with provider ID cross-reference to avoid false
        positives from similarly named titles. The item must have at least
        one playable MediaSource. If the file exists on disk (leg 2 passes)
        but Jellyfin does not know about it, the library scan handshake is
        broken (see availability progression contract arr_to_jellyfin).

    - leg: 4
      id: jellyseerr_fulfilled
      description: "Jellyseerr request shows available status"
      target_vm: streaming-stack
      target_service: jellyseerr
      api_endpoint: "/api/v1/request/{requestId}"
      api_auth: "X-Api-Key header from Infisical"
      check_field: "media.status"
      pass_criteria: "media.status in [3, 4]"
      pass_values:
        3: "available"
        4: "partially_available"
      fail_meaning: "Jellyseerr has not received the availability signal from Radarr"
      fail_severity: medium
      depends_on: arr_hasfile
      detail: |
        This leg is only applicable when a Jellyseerr request exists for the
        title. If no request exists (e.g., item was added directly to Radarr),
        this leg is SKIP (not fail). The media.status enum: 1=unknown,
        2=pending, 3=processing, 4=partially_available, 5=available.

# ─────────────────────────────────────────────────────────────────────────
# Verdict Logic
# ─────────────────────────────────────────────────────────────────────────

verdict:
  all_pass: "AVAILABLE - item is fully available end-to-end"
  any_critical_fail: "UNAVAILABLE - critical leg failure prevents playback"
  high_fail_only: "DEGRADED - file exists and is imported but library propagation incomplete"
  medium_fail_only: "PARTIAL - file is playable but request tracking is stale"
  skip_handling: "Legs with no applicable data (e.g., no Jellyseerr request) are SKIP and do not affect verdict"

# ─────────────────────────────────────────────────────────────────────────
# Sampling Strategy
# ─────────────────────────────────────────────────────────────────────────

sampling:
  description: |
    Running the full check chain against every title is expensive.
    The verification spec supports both targeted and sampled modes.

  modes:
    - mode: targeted
      description: "Check specific titles by ID (e.g., recently imported or user-reported)"
      input: "List of Radarr movie IDs or Jellyseerr request IDs"
      use_case: "Incident response, post-import validation"

    - mode: sampled
      description: "Random sample from hasFile=true population"
      sample_size: 10
      sample_method: "Random selection from Radarr movies where hasFile=true"
      use_case: "Scheduled verification, drift detection"
      frequency: "Daily or on-demand"

    - mode: full_audit
      description: "Check every title with hasFile=true"
      use_case: "Pre-migration baseline, periodic deep audit"
      frequency: "Monthly or pre-migration only"
      warning: "May take significant time with large libraries (1000+ titles)"

# ─────────────────────────────────────────────────────────────────────────
# Integration with Existing Verify Pack
# ─────────────────────────────────────────────────────────────────────────

verify_integration:
  current_gates:
    - gate: D106
      check: "Service HTTP health"
      overlap: "None (D106 checks service up, not item availability)"
    - gate: D107
      check: "Port collision"
      overlap: "None"
    - gate: D240
      check: "Import list policy"
      overlap: "None (D240 checks intake policy, not availability)"

  proposed_gate:
    id: TBD
    description: "media-e2e-availability-lock"
    ring: standard
    mode: report
    check_type: "sampled (10 random hasFile=true titles)"
    pass_criteria: "All sampled items pass all applicable legs"
    integration: |
      Wire into media verify pack alongside D106/D107/D240.
      Run in report mode initially; promote to enforce after
      handshake timing is validated at runtime.

  proposed_capability:
    id: "media.e2e.verify"
    description: "End-to-end media availability verification"
    plane: fabric
    scope: media
    args:
      - "--mode targeted|sampled|full_audit"
      - "--ids <comma-separated Radarr movie IDs>"
      - "--sample-size <N> (default 10, for sampled mode)"
    output: "Structured YAML report with per-item per-leg results and verdict"

# ─────────────────────────────────────────────────────────────────────────
# Cross-References
# ─────────────────────────────────────────────────────────────────────────

cross_references:
  progression_contract: "ops/bindings/media.availability.progression.contract.yaml"
  queue_policy: "ops/bindings/media.queue.reconciliation.policy.yaml"
  service_registry: "ops/bindings/media.services.yaml"
  path_authority: "ops/bindings/media.path.authority.contract.yaml"
  topology_history: "ops/bindings/media.topology.history.yaml"

# ─────────────────────────────────────────────────────────────────────────
# Lifecycle
# ─────────────────────────────────────────────────────────────────────────

promotion_lifecycle:
  current: active
  promotion_path:
    - from: active
      to: enforced
      requires: "Drift gate created, wired to verify pack, sampled mode passing for 7 days"
  blocked_by:
    - "GAP-OP-1392 requires runtime SSH to validate with live data"
    - "Handshake timing assumptions must be validated with live data"

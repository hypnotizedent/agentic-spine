# ═══════════════════════════════════════════════════════════════════════════
# Stack Discovery Knowledge Base Contract
# ═══════════════════════════════════════════════════════════════════════════
# Governs the self-hosted tool knowledge base: source registry, fetch
# pipeline, normalize-embed-index workflow, query capability, and
# refresh schedule.
#
# Source plan: PLAN-NETWORK-SECURITY-OPS-WORKER-20260303
# Parent loop: LOOP-NETWORK-SECURITY-OPS-WORKER-SPEC-20260303
# Linked gap: GAP-OP-1460 (stack discovery knowledge base)
# ═══════════════════════════════════════════════════════════════════════════

contract_id: STACK_DISCOVERY_KNOWLEDGE_V1
version: "1.0"
status: planned
created: "2026-03-03"
owner: "@ronny"

description: >
  A queryable knowledge base of self-hosted tools, products, and
  alternatives. Agents can ask "what self-hosted tool exists for X?"
  and receive curated, up-to-date answers drawn from maintained source
  catalogs. The pipeline fetches, normalizes, embeds, and indexes
  external source data on a scheduled cadence.

# ────────────────────────────────────────────────────────────────────────────
# SOURCE REGISTRY
# ────────────────────────────────────────────────────────────────────────────
source_registry:
  description: >
    External catalogs and lists that serve as input to the knowledge base.
    Each source has a fetch method, schema, and freshness contract.

  sources:
    - id: awesome-selfhosted
      name: "Awesome Self-Hosted"
      url: "https://github.com/awesome-selfhosted/awesome-selfhosted"
      fetch_method: "git clone / pull (README.md + data/)"
      format: markdown
      schema:
        fields: ["name", "description", "url", "license", "language", "category"]
      freshness: "weekly"
      priority: primary

    - id: awesome-sysadmin
      name: "Awesome Sysadmin"
      url: "https://github.com/awesome-foss/awesome-sysadmin"
      fetch_method: "git clone / pull"
      format: markdown
      schema:
        fields: ["name", "description", "url", "license", "category"]
      freshness: "weekly"
      priority: primary

    - id: selfh-st
      name: "selfh.st (Self-Hosted Directory)"
      url: "https://selfh.st/apps/"
      fetch_method: "HTTP scrape or API (if available)"
      format: html
      schema:
        fields: ["name", "description", "url", "category", "docker_support"]
      freshness: "weekly"
      priority: secondary

    - id: linuxserver-fleet
      name: "LinuxServer.io Fleet"
      url: "https://fleet.linuxserver.io/api/v2/images"
      fetch_method: "REST API (JSON)"
      format: json
      schema:
        fields: ["name", "image", "description", "pulls", "stars", "category"]
      freshness: "weekly"
      priority: secondary

    - id: alternativeto
      name: "AlternativeTo (self-hosted filter)"
      url: "https://alternativeto.net/platform/self-hosted/"
      fetch_method: "HTTP scrape"
      format: html
      schema:
        fields: ["name", "description", "url", "alternatives_to", "license"]
      freshness: "monthly"
      priority: tertiary

    - id: local-service-registry
      name: "Spine SERVICE_REGISTRY"
      url: "local"
      fetch_method: "Read docs/governance/SERVICE_REGISTRY.yaml"
      format: yaml
      schema:
        fields: ["name", "vm", "status", "domain", "health_url"]
      freshness: "real-time (local file)"
      priority: primary
      detail: "Cross-reference to identify already-deployed services"

# ────────────────────────────────────────────────────────────────────────────
# PIPELINE: FETCH → NORMALIZE → EMBED → INDEX
# ────────────────────────────────────────────────────────────────────────────
pipeline:
  description: >
    Four-stage pipeline that transforms raw source data into a queryable
    vector index.

  stages:
    - stage: fetch
      description: "Download/pull latest data from each source"
      output: "Raw files in staging directory"
      error_handling: "Per-source retry (3x), skip on persistent failure"
      storage: "ops/runtime/stack-discovery/staging/"

    - stage: normalize
      description: "Parse raw data into uniform JSON schema"
      output: "Normalized JSON documents (one per tool)"
      schema:
        tool_name: "string (required)"
        description: "string (required)"
        url: "string (required)"
        categories: "string[] (required)"
        license: "string (optional)"
        language: "string (optional)"
        docker_support: "boolean (optional)"
        source_id: "string (required, reference to source registry)"
        last_fetched: "ISO 8601 timestamp"
        already_deployed: "boolean (cross-ref with SERVICE_REGISTRY)"
      storage: "ops/runtime/stack-discovery/normalized/"

    - stage: embed
      description: "Generate vector embeddings for semantic search"
      model: "TBD (local model preferred: nomic-embed-text, all-MiniLM-L6-v2)"
      input: "Concatenation of tool_name + description + categories"
      output: "Vector embeddings (dimension depends on model)"
      storage: "ops/runtime/stack-discovery/embeddings/"
      detail: >
        Prefer local embedding model to avoid external API dependency.
        AnythingLLM already runs a local embedding model that could be reused.

    - stage: index
      description: "Load embeddings into vector store for similarity search"
      backend: "TBD (ChromaDB, LanceDB, or AnythingLLM workspace)"
      storage: "ops/runtime/stack-discovery/index/"
      detail: >
        AnythingLLM is already deployed and could serve as the index.
        Alternative: lightweight ChromaDB or LanceDB for dedicated use.

# ────────────────────────────────────────────────────────────────────────────
# QUERY CAPABILITY
# ────────────────────────────────────────────────────────────────────────────
query:
  description: >
    Agents invoke the query capability with a natural language question.
    The system embeds the query, performs similarity search against the
    index, and returns ranked results.

  interface:
    capability_name: "stack.discovery.query"
    input: "Natural language query string"
    output:
      format: "JSON array of ranked results"
      fields: ["tool_name", "description", "url", "categories", "score", "already_deployed"]
      max_results: 10
    examples:
      - query: "What self-hosted tools exist for password management?"
        expected_top_results: ["Vaultwarden", "Bitwarden", "Passbolt", "KeeWeb"]
      - query: "Alternatives to Notion for self-hosted note taking?"
        expected_top_results: ["Outline", "BookStack", "Wiki.js", "Trilium"]
      - query: "Self-hosted monitoring and alerting"
        expected_top_results: ["Uptime Kuma", "Grafana", "Prometheus", "Netdata"]

  cross_reference:
    description: >
      Results include an `already_deployed` flag by cross-referencing
      against the local SERVICE_REGISTRY. This helps agents avoid
      recommending tools that are already in use.

# ────────────────────────────────────────────────────────────────────────────
# REFRESH SCHEDULE
# ────────────────────────────────────────────────────────────────────────────
refresh_schedule:
  method: "Scheduled capability invocation"
  cadence: "Daily (0300 UTC)"
  mechanism: "LaunchAgent plist or cron on macOS control plane"
  capability: "stack.discovery.refresh"
  timeout: "600s"
  success_criteria:
    - "At least 80% of sources fetched successfully"
    - "Normalized document count > 1000"
    - "Index rebuild completes without error"
    - "Freshness < 36 hours"
  failure_handling:
    - "Log failure to Loki"
    - "Uptime Kuma heartbeat skip → alert"
    - "Stale index remains queryable (last good version)"

# ────────────────────────────────────────────────────────────────────────────
# PLANNED CAPABILITIES
# ────────────────────────────────────────────────────────────────────────────
planned_capabilities:
  - name: stack.discovery.refresh
    description: "Fetch, normalize, embed, and index all sources"
    safety: mutating
    approval: auto
    status: planned

  - name: stack.discovery.query
    description: "Semantic search against indexed knowledge base"
    safety: read-only
    approval: auto
    status: planned

  - name: stack.discovery.sources.add
    description: "Add a new source to the registry"
    safety: mutating
    approval: manual
    status: planned

  - name: stack.discovery.sources.list
    description: "List all registered sources with health/freshness status"
    safety: read-only
    approval: auto
    status: planned

# ────────────────────────────────────────────────────────────────────────────
# PROPOSED GATE
# ────────────────────────────────────────────────────────────────────────────
proposed_gates:
  - id: D347
    name: netsec-stack-discovery-freshness-lock
    description: "Enforce knowledge base refresh < 36h and source success >= 80%"
    mode: report
    promote_to_enforce_after_clean_runs: 3

owner: "@ronny"
authority_loop: LOOP-MEDIA-RUNTIME-REPAIR-20260303
original_skeleton_loop: LOOP-MEDIA-SHOP-HOME-MIGRATION-CONNECTOR-20260303

description: |
  Canonical path authority matrix for the media pipeline.
  Every service that touches media files must have an explicit 4-way parity
  tuple: compose_mount, app_root, downloader_path, library_path.
  Drift between any two members of a tuple is a contract violation.

  Populated from Feb 25 container path trace audit (docker inspect + write tests)
  and gap trace evidence. TBD fields resolved on 2026-03-04 via SSH runtime API
  queries to download-stack (VM 209) and streaming-stack (VM 210) over Tailscale.

# NFS mount topology (runtime verified 2026-03-04)
nfs_mount_topology:
  download-stack:
    host_path: "/mnt/media"
    nfs_source: "192.168.1.184:/media"
    mode: rw
    nfs_version: "4.2"
    verified_at: "2026-03-04"
    verification_method: "mount | grep nfs via SSH ubuntu@100.107.36.76"
    description: "NFS mount on VM 209 for ARR import/download — read-write for import operations"
  streaming-stack:
    host_path: "/mnt/media"
    nfs_source: "192.168.1.184:/media"
    mode: ro
    nfs_version: "4.2"
    verified_at: "2026-03-04"
    verification_method: "mount | grep nfs via SSH ubuntu@100.123.207.64"
    description: "NFS mount on VM 210 for Jellyfin/Navidrome playback — read-only for streaming"
  docker_volumes:
    download-stack:
      host_path: "/mnt/docker"
      nfs_source: "192.168.1.184:/tank/docker/download-stack"
      mode: rw
    streaming-stack:
      host_path: "/mnt/docker"
      nfs_source: "192.168.1.184:/tank/docker/streaming-stack"
      mode: rw

# Path parity tuples — each service's file access paths must be internally consistent
# All fields verified via runtime API queries + docker inspect on 2026-03-04
path_tuples:
  radarr:
    vm: download-stack
    compose_mount: "/mnt/media/movies -> /movies, /mnt/media -> /media"
    app_root: "/movies"
    app_root_id: 1
    app_root_archive: "/media/movies-archive"
    app_root_archive_id: 2
    downloader_path:
      - host: "100.125.138.110"
        remote: "/downloads/complete/"
        local: "/downloads/complete/"
        id: 1
      - host: "100.125.138.110"
        remote: "/mnt/staging/downloads/complete/"
        local: "/downloads/complete/"
        id: 2
    library_path: "/movies"
    verification_status: verified
    verified_at: "2026-03-04"
    gap_ref: GAP-OP-1387
    evidence: |
      2026-03-04 runtime API query via SSH:
      - GET /api/v3/rootfolder: returns [{path: "/movies", accessible: true, freeSpace: 1388385927168, id: 1}, {path: "/media/movies-archive", accessible: true, id: 2}]
      - GET /api/v3/remotepathmapping: returns 2 entries for host 100.125.138.110
      - docker inspect: /mnt/media/movies -> /movies, /mnt/media -> /media, /mnt/media/downloads -> /downloads
      - FINDING: app_root IS /movies (matches compose mount). The Feb 25 hypothesis was wrong —
        there is NO mismatch. /movies IS a dedicated bind mount for /mnt/media/movies. The /media mount
        is a separate broader mount. Both paths are accessible and consistent.
      - 34 unmapped folders found in /movies root (failed/unpack artifacts + mismatched names)
    runtime_fix_required: false
    path_parity_status: "CONSISTENT — /movies bind mount maps to /mnt/media/movies on host"

  sonarr:
    vm: download-stack
    compose_mount: "/mnt/media/tv -> /tv, /mnt/media -> /media"
    app_root: "/tv"
    app_root_id: 1
    downloader_path:
      - host: "100.125.138.110"
        remote: "/downloads/complete/"
        local: "/downloads/complete/"
        id: 1
    library_path: "/tv"
    verification_status: verified
    verified_at: "2026-03-04"
    evidence: |
      2026-03-04 runtime API query via SSH:
      - GET /api/v3/rootfolder: [{path: "/tv", accessible: true, freeSpace: 1387800821760, id: 1}]
      - GET /api/v3/remotepathmapping: 1 entry for host 100.125.138.110
      - docker inspect: /mnt/media/tv -> /tv, /mnt/media -> /media
      - Path parity confirmed: /tv bind mount maps to /mnt/media/tv on host
    path_parity_status: "CONSISTENT"

  lidarr:
    vm: download-stack
    compose_mount: "/mnt/media/music -> /music, /mnt/media -> /media"
    app_root: "/media/music"
    app_root_id: 2
    app_root_name: "Music"
    downloader_path:
      - host: "100.125.138.110"
        remote: "/downloads/complete/"
        local: "/downloads/complete/"
        id: 1
      - host: "slskd"
        remote: "/downloads/"
        local: "/media/downloads/slskd/"
        id: 2
    library_path: "/media/music"
    verification_status: verified
    verified_at: "2026-03-04"
    evidence: |
      2026-03-04 runtime API query via SSH:
      - GET /api/v1/rootfolder: [{name: "Music", path: "/media/music", id: 2}]
      - GET /api/v1/remotepathmapping: 2 entries (SAB at 100.125.138.110, slskd internal)
      - docker inspect: /mnt/media/music -> /music (dedicated), /mnt/media -> /media (broad)
      - NOTE: Lidarr uses /media/music as root (via broad mount), NOT /music (dedicated mount).
        Both paths resolve to the same host directory /mnt/media/music. No conflict.
      - slskd remote path mapping enables Soulseek downloads via /media/downloads/slskd/
    path_parity_status: "CONSISTENT — dual mount path, both resolve to /mnt/media/music"

  sabnzbd:
    vm: download-stack
    compose_mount: "/mnt/media/downloads -> /downloads"
    app_root: null
    downloader_path: "/downloads"
    library_path: null
    verification_status: verified
    verified_at: "2026-03-04"
    gap_ref: GAP-OP-1388
    evidence: |
      2026-03-04 runtime verification via SSH:
      - docker inspect: /mnt/media/downloads -> /downloads
      - Radarr remote path mapping confirms /downloads/complete/ <-> /downloads/complete/
      - The host path /mnt/media/downloads IS the same NFS mount as /mnt/media (subpath)
      - Category subdirs are created dynamically by SAB on download completion
    path_parity_status: "CONSISTENT"

  qbittorrent:
    vm: download-stack
    compose_mount: "/mnt/media/downloads -> /downloads"
    app_root: null
    downloader_path: "/downloads"
    library_path: null
    verification_status: verified
    verified_at: "2026-03-04"
    evidence: |
      2026-03-04: docker inspect confirms /mnt/media/downloads -> /downloads.
      Same NFS path as sabnzbd. Consistent.
    path_parity_status: "CONSISTENT"

  jellyfin:
    vm: streaming-stack
    compose_mount: "/mnt/media -> /media (ro)"
    app_root: null
    downloader_path: null
    library_path: "/media/movies,/media/tv,/media/music"
    verification_status: verified
    verified_at: "2026-03-04"
    evidence: |
      2026-03-04 runtime verification via SSH:
      - docker inspect: /mnt/media -> /media (ro)
      - NFS mount: 192.168.1.184:/media -> /mnt/media (ro, NFSv4.2)
      - Jellyfin search API confirms library entries at /media/movies/*, /media/tv/*
      - E2E sample: 5/5 movies found in Jellyfin with correct paths
    path_parity_status: "CONSISTENT"

  navidrome:
    vm: streaming-stack
    compose_mount: "/mnt/media/music -> /music (ro)"
    app_root: null
    downloader_path: null
    library_path: "/music"
    verification_status: verified
    verified_at: "2026-03-04"
    evidence: "Feb 25 audit + 2026-03-04: docker inspect confirms mount. NFS ro."
    path_parity_status: "CONSISTENT"

  bazarr:
    vm: streaming-stack
    compose_mount: "/mnt/media -> /media (ro)"
    app_root: null
    downloader_path: null
    library_path: "/media/movies,/media/tv"
    verification_status: verified
    verified_at: "2026-03-04"
    evidence: "Feb 25 audit + 2026-03-04: docker inspect confirms mount. NFS ro."
    path_parity_status: "CONSISTENT"


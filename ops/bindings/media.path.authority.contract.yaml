    severity: medium

  - id: flaresolverr-anonymous-volume
    container: flaresolverr
    finding: "Anonymous volume for /config — fragile on recreate"
    gap_ref: GAP-OP-912
    severity: low

  - id: decypharr-anonymous-volume
    container: decypharr
    finding: "Anonymous volume for /app — fragile on recreate"
    gap_ref: GAP-OP-912
    severity: low

  - id: radarr-unmapped-folders
    container: radarr
    finding: "34 unmapped folders in /movies root — _FAILED_*, _UNPACK_*, duplicate release names"

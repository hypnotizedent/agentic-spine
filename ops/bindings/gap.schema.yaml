# Gap Entry Schema
#
# Defines required and optional fields for entries in operational.gaps.yaml.
# Referenced by: docs/governance/GAP_LIFECYCLE.md
# Enforced by: D332 gap-schema-conformance-lock
#
# Status: authoritative
# Last verified: 2026-03-03

schema_version: "1.1"

required_fields:
  - name: id
    type: string
    pattern: "GAP-OP-\\d+"
    description: "Unique gap identifier"

  - name: discovered_by
    type: string
    description: "Source that discovered the gap (audit name, agent, terminal-c)"

  - name: discovered_at
    type: string
    format: "YYYY-MM-DD"
    description: "Date the gap was discovered"

  - name: type
    type: enum
    values:
      - stale-ssot
      - missing-entry
      - agent-behavior
      - unclear-doc
      - duplicate-truth
      - runtime-bug
    description: "Classification of the gap"

  - name: description
    type: string
    multiline: true
    description: "Detailed description of the gap"

  - name: severity
    type: enum
    values: [low, medium, high, critical]
    description: "Impact severity"

  - name: status
    type: enum
    values: [open, fixed, closed]
    description: "Current lifecycle status"

optional_fields:
  - name: title
    type: string
    description: "Derived short title for the gap (set by gaps-file from description)"

  - name: classification
    type: string
    description: "Mirrors type field — set by gaps-file for downstream reporting"

  - name: doc
    type: string
    description: "Path to affected document or file"

  - name: fixed_in
    type: string
    description: "Reference to fix (loop ID, commit, etc.) — set when status=fixed"

  - name: parent_loop
    type: string
    pattern: "LOOP-.*"
    description: "Orchestration linkage to parent loop"

  - name: notes
    type: string
    multiline: true
    description: "Additional context or resolution notes"

  - name: regression_lock_id
    type: string
    description: "Required non-legacy lock reference when severity is high|critical and status is fixed|closed"

  - name: blocker_class
    type: enum
    values:
      - blocked_by_ronny_arch_decision
      - blocked_by_ronny_on_site
      - blocked_by_runtime_access
    description: "Structured blocker classification for open gaps that cannot be resolved by agents alone"

  - name: owner
    type: string
    description: "Agent or terminal assigned to work on this gap"

  - name: fixed_at
    type: string
    format: "YYYY-MM-DD"
    description: "Date the gap was fixed"

  - name: closed_at
    type: string
    format: "YYYY-MM-DD"
    description: "Date the gap was closed"

  - name: created_at
    type: string
    format: "YYYY-MM-DD"
    description: "Date the gap entry was created (distinct from discovered_at)"

  - name: fixed_by
    type: string
    description: "Agent or terminal that fixed the gap"

  - name: evidence_run_keys
    type: list
    description: "Capability run keys providing evidence for fix or closure"

  - name: blocked_case
    type: enum
    values:
      - runnable_now
      - blocked
    description: "Board decision status — runnable_now means agent-closable, blocked means external action required"

  - name: next_action
    type: string
    description: "Next step required to progress this gap"

  - name: eta
    type: string
    description: "Estimated resolution timeline"

  - name: resolution
    type: string
    multiline: true
    description: "Resolution summary when status=fixed|closed"

  - name: deferred_reason
    type: string
    description: "Reason for deferring this gap"

  - name: deferred_ref
    type: string
    description: "Reference for deferred gap (loop, proposal, etc.)"

  - name: deferred_to_repo
    type: string
    description: "Repository to which this gap is deferred"

  - name: loop
    type: string
    deprecated: true
    description: "Deprecated alias for parent_loop — use parent_loop instead"

validation:
  - rule: "status in [fixed, closed] and severity in [high, critical] requires regression_lock_id"
  - rule: "regression_lock_id cannot use LEGACY-NO-REGRESSION-LOCK-* for high|critical fixed/closed gaps"

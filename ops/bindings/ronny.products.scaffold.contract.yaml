---
# Ronny Products Scaffold Governance Contract
# Defines required structure, naming rules, and evidence rules for non-mint products.
status: authoritative
owner: "@ronny"
created: "2026-03-05"
version: "1.0"
loop_id: LOOP-RONNY-PRODUCTS-BOUNDARY-CUTOVER-PREFLIGHT-20260305

product_repo:
  path: "~/code/ronny-products"
  cli: "bin/productctl"

profiles:
  standalone-app:
    description: "Full application with own codebase, database, and deployment"
    required_dirs: [src, docs]
    optional_dirs: [schema, scripts, tests]
    required_files: [app.contract.yaml]
    health_endpoint_required: true
  integration-only:
    description: "Adopted OSS tool with Docker compose + config only"
    required_dirs: [docs]
    optional_dirs: [config, scripts]
    required_files: [app.contract.yaml]
    health_endpoint_required: true
  research-phase:
    description: "Planning artifacts only, no runtime code"
    required_dirs: [docs]
    optional_dirs: []
    required_files: [app.contract.yaml]
    health_endpoint_required: false

naming_rules:
  product_id_regex: '^[a-z0-9][a-z0-9-]*$'
  contract_file: "app.contract.yaml"
  deployment_plan: "docs/DEPLOYMENT_PLAN.md"

evidence_rules:
  scaffold_proof: "productctl scaffold --dry-run output matches contract"
  shape_proof: "productctl shape-check passes for all products"
  content_proof: "productctl content-check passes for all products"
  guard_proof: "pre-commit hooks pass (shape + content + DNA guards)"

registered_products:
  - id: cc-benefits-tracker
    profile: standalone-app
    status: planned
    spine_loop: LOOP-CREDIT-CARD-BENEFITS-TRACKER-20260302
    spine_proposal: CP-20260302-031900
  - id: vouchervault
    profile: integration-only
    status: planned
    spine_loop: LOOP-VOUCHERVAULT-DEPLOYMENT-20260302
    spine_proposal: CP-20260302-031644
  - id: inbox-shield
    profile: standalone-app
    status: active
    spine_loop: LOOP-INBOX-SHIELD-PHASE-0-20260302
    spine_proposal: CP-20260302-032318

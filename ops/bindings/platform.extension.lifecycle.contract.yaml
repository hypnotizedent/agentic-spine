status: authoritative
owner: "@ronny"
last_verified: 2026-02-23
scope: platform-extension-lifecycle-contract
statuses:
  - planned
  - proposed
  - approved
  - executed
  - closed
  - blocked
allowed_transitions:
  planned:
    - proposed
    - blocked
  proposed:
    - approved
    - blocked
  approved:
    - executed
    - blocked
  executed:
    - closed
    - blocked
  blocked:
    - proposed
    - closed
required_evidence:
  proposed:
    required_fields:
      - loop_id
      - proposal_id
  approved:
    required_homes_all_ready: true
  executed:
    required_fields:
      - run_keys
  closed:
    required_fields:
      - verify_core_run_key
      - verify_pack_run_key
      - proposals_status_run_key
lifecycle_hooks:
  service_type:
    on_transition:
      approved_to_executed:
        - capability: cloudflare.service.lifecycle.publish
          condition: exposure_intent == public
          phase: deploy
          mode: execute
          required: true
      proposed_to_approved:
        - capability: cloudflare.service.lifecycle.publish
          condition: exposure_intent == public
          phase: bind
          mode: audit
          required: false
    on_audit:
      any_status:
        - capability: cloudflare.service.lifecycle.publish
          condition: exposure_intent == public
          phase: transition
          mode: audit
          required: false

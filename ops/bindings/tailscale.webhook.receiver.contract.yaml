# Tailscale Webhook Receiver Contract
# Authority: docs/CANONICAL/TAILSCALE_AUTHORITY_CONTRACT_V1.yaml
# Gap: GAP-OP-1259
# Status: planned (blocked on receiver infrastructure deployment)
# Loop: LOOP-TAILSCALE-INTEGRATION-DEFERRED-ACTIONS-20260302
# Plan: PLAN-TAILSCALE-INTEGRATION-DEFERRED-ACTIONS

status: planned
owner: "@ronny"
created: "2026-03-03"
last_verified: "2026-03-03"
scope: tailscale-webhook-receiver-deployment-and-subscription
version: "1.0"

summary: |
  Contract governing the deployment, configuration, and lifecycle of
  a Tailscale webhook receiver endpoint. The Tailscale webhook API
  (POST /api/v2/tailnet/{tailnet}/webhooks) is confirmed available,
  but no receiver endpoint has been deployed to accept events.

authority_references:
  tailscale_authority: "docs/CANONICAL/TAILSCALE_AUTHORITY_CONTRACT_V1.yaml"
  ssh_lifecycle_contract: "ops/bindings/tailscale.ssh.lifecycle.contract.yaml"
  operator_actions: "mailroom/state/tailscale-audit/operator-actions-20260302.yaml"
  operator_action_id: OP-TS-001

api:
  subscribe_endpoint: "POST /api/v2/tailnet/{tailnet}/webhooks"
  list_endpoint: "GET /api/v2/tailnet/{tailnet}/webhooks"
  delete_endpoint: "DELETE /api/v2/tailnet/{tailnet}/webhooks/{webhookId}"
  auth: oauth_bearer
  oauth_scopes_required:
    - webhooks:read
    - webhooks:write
  api_confirmed: true
  api_verified_at: "2026-03-02"

endpoint:
  url_convention: "https://n8n.ronny.works/webhook/tailscale"
  protocol: https
  tls_required: true
  public_reachability_required: true
  deployment_target:
    primary:
      label: n8n_webhook_node
      host: "automation-stack (VM 202, 192.168.1.110)"
      url: "https://n8n.ronny.works/webhook/tailscale"
      rationale: "Integrates with existing n8n automation workflows for alerting and dispatch"
      ingress: "Cloudflare tunnel -> n8n"
    fallback:
      label: dedicated_receiver
      host: "automation-stack (VM 202)"
      type: "Lightweight HTTP service (container-based)"
      rationale: "Use only if n8n is unsuitable or if webhook volume requires dedicated processing"
  health_check:
    method: GET
    path: "/webhook/tailscale/health"
    expected_status: 200
    interval_seconds: 300

event_subscriptions:
  events:
    - id: nodeCreated
      description: "New device joins tailnet"
      action: "Log event, alert operator, update tailnet snapshot"
      priority: high
    - id: nodeDeleted
      description: "Device removed from tailnet"
      action: "Log event, alert operator, update tailnet snapshot, check for orphaned SSH targets"
      priority: high
    - id: nodeKeyExpiringInOneDay
      description: "Device key expires within 24 hours"
      action: "Alert operator for key renewal, log expiry warning"
      priority: medium
    - id: policyUpdate
      description: "ACL policy changed (drift detection)"
      action: "Alert operator, trigger tailscale.acl.status for drift check"
      priority: high
  provider_type: slack
  provider_type_detail: "Tailscale API requires a providerType field; 'slack' is used as the generic webhook type"

auth_pattern:
  webhook_secret:
    storage: infisical
    infisical_project: infrastructure
    infisical_env: prod
    infisical_path: "/spine/vm-infra/provisioning"
    key_name: TAILSCALE_WEBHOOK_SECRET
    rotation_policy: "Rotate on compromise or webhook recreation"
  signature_verification:
    header: "Tailscale-Webhook-Signature"
    algorithm: hmac-sha256
    verification_required: true
    detail:
      - "Receiver MUST validate HMAC signature against stored webhook secret"
      - "Reject unsigned or invalid-signature payloads with HTTP 403"

retry_policy:
  tailscale_behavior:
    max_retries: 5
    backoff: exponential
    initial_delay_seconds: 60
    detail:
      - "Tailscale retries failed deliveries automatically"
      - "Receiver should return 2xx within 10 seconds to avoid timeout-based retries"
  receiver_requirements:
    idempotency: required
    idempotency_key: "event ID + timestamp"
    response_timeout_seconds: 10
    acceptable_response_codes: [200, 201, 202, 204]
    error_handling:
      - "Return 200 even if downstream processing fails (ack receipt, process async)"
      - "Log failed processing for manual remediation"

n8n_integration:
  workflow_spec:
    trigger: webhook_node
    path: "/webhook/tailscale"
    method: POST
    authentication: header_auth
    processing_nodes:
      - label: signature_verify
        type: function
        purpose: "Validate HMAC-SHA256 signature"
      - label: event_router
        type: switch
        purpose: "Route by event type (nodeCreated, nodeDeleted, policyUpdate, nodeKeyExpiring)"
      - label: alert_dispatch
        type: http_request
        purpose: "Forward alerts to configured notification channel"
      - label: snapshot_update
        type: execute_command
        purpose: "Trigger tailnet snapshot refresh on node changes"
    error_workflow: "Catch errors, log to n8n execution history, alert on persistent failures"

deployment_checklist:
  prerequisites:
    - id: PRE-1
      description: "Confirm automation-stack (VM 202) is healthy and reachable"
      command: "ssh automation@192.168.1.110 uptime"
      status: blocked
      blocker: "VM 202 currently unreachable"
    - id: PRE-2
      description: "Confirm n8n is running and webhook endpoint is routable"
      command: "curl -s https://n8n.ronny.works/webhook/tailscale/health"
      status: blocked
      depends_on: PRE-1
    - id: PRE-3
      description: "Deploy n8n webhook workflow or dedicated receiver"
      status: blocked
      depends_on: PRE-2
  subscription_steps:
    - id: SUB-1
      description: "Create webhook subscription via API"
      command: "./bin/ops cap run tailscale.webhook.subscribe -- --action create --endpoint https://n8n.ronny.works/webhook/tailscale"
      depends_on: PRE-3
    - id: SUB-2
      description: "Store returned webhook secret in Infisical"
      command: "infisical secrets set TAILSCALE_WEBHOOK_SECRET=<secret> --projectId=<id> --env=prod"
      depends_on: SUB-1
    - id: SUB-3
      description: "Verify subscription is active"
      command: "./bin/ops cap run tailscale.webhook.subscribe -- --action status"
      depends_on: SUB-2
    - id: SUB-4
      description: "Test webhook delivery by triggering a policy update"
      depends_on: SUB-3

blockers:
  - id: BLOCK-1
    description: "automation-stack (VM 202, 192.168.1.110) is currently unreachable"
    gap_ref: GAP-OP-1259
    severity: medium
    resolution: "Restore VM 202 connectivity, then proceed with deployment"
  - id: BLOCK-2
    description: "n8n webhook deployment requires VM 202 availability"
    depends_on: BLOCK-1

capability_binding:
  existing: tailscale.webhook.subscribe
  planned_capabilities:
    - id: tailscale.webhook.receiver.status
      lifecycle: experimental
      description: "Health check for the deployed webhook receiver endpoint"
      safety: read-only

gate_policy:
  planned_gate: "TBD -- webhook receiver health enforcement gate"
  mode: report
  promote_after_clean_runs: 3

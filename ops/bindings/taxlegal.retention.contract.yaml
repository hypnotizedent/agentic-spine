# Tax-Legal Retention Contract
# Status: planned (Wave 1 design-only)
# Gap: GAP-OP-1430
# Loop: LOOP-TAXLEGAL-W1-BINDINGS-CONTRACT-PACK-20260303
# Plan: PLAN-TAX-LEGAL-OPS-WORKER-20260303

contract_id: TAXLEGAL_RETENTION_V1
version: "1.0"
lifecycle: experimental
created: "2026-03-03"
owner: "@ronny"
scope: taxlegal-retention-policy

description: >
  Retention windows, purge policies, and archival rules for tax-legal
  case artifacts. All retention operations that destroy or modify data
  require manual operator approval.

authority_references:
  agent_contract: ops/agents/tax-legal-agent.contract.md
  privacy_contract: ops/bindings/taxlegal.privacy.contract.yaml
  case_lifecycle: ops/bindings/taxlegal.case.lifecycle.contract.yaml

# ────────────────────────────────────────────────────────────────────────────
# SLA PROFILES
# ────────────────────────────────────────────────────────────────────────────
sla_profiles:
  - id: minimal
    description: "Shortest retention windows for low-risk, low-value cases"
    ops_logs_days: 30
    source_citation_lockfiles_days: 180
    draft_packet_artifacts_days: 180
    final_reviewed_packet_years: 5

  - id: balanced
    description: "Default retention profile for standard tax-legal cases"
    ops_logs_days: 45
    source_citation_lockfiles_days: 365
    draft_packet_artifacts_days: 365
    final_reviewed_packet_years: 7

  - id: extended
    description: "Extended retention for high-value or complex cases"
    ops_logs_days: 90
    source_citation_lockfiles_days: 730
    draft_packet_artifacts_days: 730
    final_reviewed_packet_years: 10

default_profile: balanced

# ────────────────────────────────────────────────────────────────────────────
# ARTIFACT CATEGORIES
# ────────────────────────────────────────────────────────────────────────────
artifact_categories:
  - id: ops_logs
    description: "Operational logs, trace outputs, prompt history"
    retention_field: ops_logs_days
    purge_type: hard_delete
    detail: "Includes all redacted prompt/trace outputs from case execution"

  - id: source_citation_lockfiles
    description: "Source registry snapshots, citation lockfiles, hash records"
    retention_field: source_citation_lockfiles_days
    purge_type: archive_then_delete
    detail: "Lockfiles document the exact source versions used in research"

  - id: draft_packet_artifacts
    description: "Draft filing packets, research outputs, intermediate checklists"
    retention_field: draft_packet_artifacts_days
    purge_type: archive_then_delete
    detail: "Working artifacts from case progression, pre-review"

  - id: final_reviewed_packets
    description: "Final attorney/CPA reviewed packets, memos, and sign-off evidence"
    retention_field: final_reviewed_packet_years
    purge_type: archive_then_delete
    detail: "Canonical evidence of reviewed and approved compliance actions"

  - id: redaction_failure_artifacts
    description: "Artifacts from PII redaction failures or privacy incidents"
    retention_rule: "Retained until manual incident close, then 90 days"
    purge_type: hard_delete
    detail: "Must be manually reviewed and closed before purge timer starts"

# ────────────────────────────────────────────────────────────────────────────
# PURGE OPERATIONS
# ────────────────────────────────────────────────────────────────────────────
purge_operations:
  approval_required: true
  approval_type: manual
  detail: >
    All purge operations require explicit operator approval via
    taxlegal.retention.enforce capability. No automated purge is
    permitted in v1.

  purge_types:
    - id: hard_delete
      description: "Permanently delete artifact with no recovery"
      requires_confirmation: true
      audit_trail: required

    - id: archive_then_delete
      description: "Move to cold storage archive, then delete after archive confirmation"
      archive_target: "planned (backup domain integration)"
      requires_confirmation: true
      audit_trail: required

# ────────────────────────────────────────────────────────────────────────────
# RETENTION ENFORCEMENT CAPABILITY
# ────────────────────────────────────────────────────────────────────────────
capabilities:
  - id: taxlegal.retention.enforce
    safety: mutating
    approval: manual
    description: "Purge/archive case artifacts per retention contract"
    lifecycle: experimental
    guardrail: "Requires manual approval for all destructive operations"

# ────────────────────────────────────────────────────────────────────────────
# RETENTION RULES
# ────────────────────────────────────────────────────────────────────────────
retention_rules:
  - rule: no_auto_purge
    description: "No automated purge of any case artifact in v1"
    enforcement: policy

  - rule: retention_timer_starts_at_case_close
    description: "Retention countdown begins when case transitions to closed state"
    enforcement: planned_gate

  - rule: open_case_no_purge
    description: "Artifacts for open or blocked cases must not be purged regardless of age"
    enforcement: planned_gate

  - rule: change_controlled_windows
    description: "Retention window changes require governance doc update and operator approval"
    enforcement: policy

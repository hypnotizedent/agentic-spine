# ═══════════════════════════════════════════════════════════════════════════
# DNS Authority Contract
# ═══════════════════════════════════════════════════════════════════════════
# Governs the recursive DNS resolution chain for all managed networks.
# Eliminates upstream provider visibility into query patterns via local
# Unbound resolver with DNSSEC validation and DoH fallback.
#
# Source plan: PLAN-NETWORK-SECURITY-OPS-WORKER-20260303
# Parent loop: LOOP-NETWORK-SECURITY-OPS-WORKER-SPEC-20260303
# Linked gaps: GAP-OP-1449 (Unbound), GAP-OP-1450 (DoH), GAP-OP-1452 (bypass)
# ═══════════════════════════════════════════════════════════════════════════

contract_id: NETWORK_DNS_AUTHORITY_V1
version: "1.0"
status: planned
created: "2026-03-03"
owner: "@ronny"

description: >
  Defines the authoritative DNS resolution chain for home and shop networks.
  Pi-hole remains the client-facing resolver (DHCP-assigned). Unbound runs
  as a recursive resolver behind Pi-hole, eliminating reliance on upstream
  public resolvers. cloudflared provides encrypted DoH fallback when
  recursive resolution is unavailable. DNSSEC is enforced at the Unbound
  layer. UniFi firewall rules prevent any device from bypassing Pi-hole.

# ────────────────────────────────────────────────────────────────────────────
# RESOLUTION CHAIN
# ────────────────────────────────────────────────────────────────────────────
resolution_chain:
  description: >
    Client → Pi-hole → Unbound (recursive) → root servers.
    Fallback: Client → Pi-hole → cloudflared (DoH) → Cloudflare 1.1.1.1.
  layers:
    - layer: client
      description: "All LAN devices use Pi-hole as sole DNS resolver via DHCP"
      enforced_by: "DHCP DNS assignment + firewall bypass prevention"

    - layer: pihole
      description: "Pi-hole handles ad/tracker blocking, forwards unblocked queries upstream"
      role: filtering_forwarder
      upstream_primary: unbound
      upstream_fallback: cloudflared

    - layer: unbound
      description: "Recursive resolver performing full iterative resolution from root servers"
      role: recursive_resolver
      upstream: root_servers
      dnssec: "validate (mandatory)"
      cache: true

    - layer: cloudflared
      description: "DNS-over-HTTPS proxy used only when Unbound is unreachable"
      role: doh_fallback_proxy
      upstream_provider: cloudflare
      upstream_url: "https://1.1.1.1/dns-query"
      protocol: doh
      activation: "Pi-hole switches to cloudflared only when Unbound health check fails"

# ────────────────────────────────────────────────────────────────────────────
# UNBOUND CONFIGURATION SPEC
# ────────────────────────────────────────────────────────────────────────────
unbound:
  deployment_target:
    home:
      host: "Pi-hole LXC 105 (proxmox-home)"
      ip: "10.0.0.53"
      install_method: "apt (unbound package)"
    shop:
      host: "VM 204 infra-core"
      ip: "192.168.1.204"
      install_method: "apt (unbound package)"

  config:
    listen_address: "127.0.0.1"
    listen_port: 5335
    interface: "127.0.0.1"
    access_control: "127.0.0.0/8 allow"
    do_ip6: false
    prefer_ip6: false
    hide_identity: true
    hide_version: true
    harden_glue: true
    harden_dnssec_stripped: true
    use_caps_for_id: true
    edns_buffer_size: 1232
    prefetch: true
    num_threads: 2
    msg_cache_slabs: 4
    rrset_cache_slabs: 4
    infra_cache_slabs: 4
    key_cache_slabs: 4
    rrset_cache_size: "64m"
    msg_cache_size: "32m"
    so_rcvbuf: "1m"

  dnssec:
    enabled: true
    auto_trust_anchor_file: "/var/lib/unbound/root.key"
    validation: "validate"
    trust_anchor_update: "unbound-anchor cron (monthly)"

  root_hints:
    source: "https://www.internic.net/domain/named.cache"
    local_path: "/var/lib/unbound/root.hints"
    refresh_schedule: "monthly cron"

  health_check:
    method: "dig @127.0.0.1 -p 5335 cloudflare.com +dnssec"
    success_criteria: "NOERROR status, ad flag present"
    check_interval: "60s"

# ────────────────────────────────────────────────────────────────────────────
# CLOUDFLARED (DoH FALLBACK)
# ────────────────────────────────────────────────────────────────────────────
cloudflared:
  deployment_target:
    home:
      host: "Pi-hole LXC 105 (proxmox-home)"
      ip: "10.0.0.53"
      install_method: "deb package (cloudflare apt repo)"
    shop:
      host: "VM 204 infra-core"
      ip: "192.168.1.204"
      install_method: "deb package (cloudflare apt repo)"

  config:
    proxy_dns: true
    proxy_dns_port: 5053
    proxy_dns_upstream:
      - "https://1.1.1.1/dns-query"
      - "https://1.0.0.1/dns-query"
    metrics: "127.0.0.1:49312"

  activation_policy: >
    cloudflared runs as a systemd service at all times but is NOT the
    primary upstream. Pi-hole conditional forwarding activates cloudflared
    only when Unbound health check fails for 3 consecutive intervals.

  health_check:
    method: "dig @127.0.0.1 -p 5053 cloudflare.com"
    success_criteria: "NOERROR status"

# ────────────────────────────────────────────────────────────────────────────
# PI-HOLE UPSTREAM CONFIGURATION
# ────────────────────────────────────────────────────────────────────────────
pihole_upstream:
  primary:
    address: "127.0.0.1#5335"
    label: "Unbound (recursive)"
  fallback:
    address: "127.0.0.1#5053"
    label: "cloudflared (DoH)"
  removed_upstreams:
    - "1.1.1.1"
    - "1.0.0.1"
    - "8.8.8.8"
    - "8.8.4.4"
  rationale: >
    All public upstream resolvers are removed. Pi-hole talks only to
    localhost services. This eliminates DNS query visibility by any
    third-party provider under normal operation.

# ────────────────────────────────────────────────────────────────────────────
# DNS BYPASS PREVENTION
# ────────────────────────────────────────────────────────────────────────────
bypass_prevention:
  description: >
    UniFi firewall rules prevent any LAN device from sending DNS queries
    to any destination other than the local Pi-hole. This closes the
    hardcoded-DNS bypass vector (e.g., Chromecast → 8.8.8.8).
  rules:
    - name: "Block DNS bypass (home)"
      network: home
      type: LAN_OUT
      action: DROP
      protocol: UDP/TCP
      destination_port: 53
      destination: "!10.0.0.53"
      source: "10.0.0.0/24"
      description: "Drop DNS to anything except Pi-hole"

    - name: "Block DNS bypass (shop)"
      network: shop
      type: LAN_OUT
      action: DROP
      protocol: UDP/TCP
      destination_port: 53
      destination: "!192.168.1.204"
      source: "192.168.1.0/24"
      description: "Drop DNS to anything except Pi-hole"

    - name: "Block DoT bypass (home)"
      network: home
      type: LAN_OUT
      action: DROP
      protocol: TCP
      destination_port: 853
      source: "10.0.0.0/24"
      description: "Drop DNS-over-TLS to prevent encrypted bypass"

    - name: "Block DoT bypass (shop)"
      network: shop
      type: LAN_OUT
      action: DROP
      protocol: TCP
      destination_port: 853
      source: "192.168.1.0/24"
      description: "Drop DNS-over-TLS to prevent encrypted bypass"

  verification:
    test_method: "dig @8.8.8.8 example.com from LAN client"
    expected_result: "timeout (query dropped by firewall)"

# ────────────────────────────────────────────────────────────────────────────
# TAILSCALE DNS COEXISTENCE
# ────────────────────────────────────────────────────────────────────────────
tailscale_coexistence:
  description: >
    Tailscale MagicDNS resolves *.ts.net names via Tailscale's internal
    100.100.100.100 resolver. This must coexist with Pi-hole/Unbound.
  policy:
    - "Tailscale MagicDNS remains active for *.ts.net resolution"
    - "Pi-hole is DHCP-assigned DNS for all LAN traffic"
    - "Tailscale override-local-dns is NOT enabled (LAN DNS takes precedence)"
    - "Devices on Tailscale split DNS: *.ts.net → MagicDNS, everything else → Pi-hole"
  related_gate: D314

# ────────────────────────────────────────────────────────────────────────────
# PLANNED CAPABILITIES
# ────────────────────────────────────────────────────────────────────────────
planned_capabilities:
  - name: network.dns.authority.deploy
    description: "Deploy and configure Unbound + cloudflared on target host"
    safety: mutating
    approval: manual
    status: planned

  - name: network.dns.authority.status
    description: "Verify Unbound reachable, DNSSEC valid, Pi-hole upstream correct"
    safety: read-only
    approval: auto
    status: planned

  - name: network.dns.bypass.test
    description: "Verify DNS bypass prevention firewall rule is active"
    safety: read-only
    approval: auto
    status: planned

# ────────────────────────────────────────────────────────────────────────────
# PROPOSED GATES
# ────────────────────────────────────────────────────────────────────────────
proposed_gates:
  - id: D340
    name: netsec-dns-authority-lock
    description: "Fail if Pi-hole upstream is not Unbound, DNSSEC invalid, or bypass prevention absent"
    mode: report
    promote_to_enforce_after_clean_runs: 3

  - id: D341
    name: netsec-pihole-drift-lock
    description: "Enforce Pi-hole blocklist policy, upstream DNS, and DHCP DNS handout"
    mode: report
    promote_to_enforce_after_clean_runs: 3

# ────────────────────────────────────────────────────────────────────────────
# CREDENTIAL POLICY
# ────────────────────────────────────────────────────────────────────────────
credential_policy:
  description: "No credentials in this contract. All secrets via Infisical path references."
  infisical_paths:
    - path: "/spine/vm-infra/network"
      keys: ["UNIFI_HOME_USER", "UNIFI_HOME_PASSWORD", "UNIFI_HOME_API_KEY"]
    - path: "/spine/vm-infra/network"
      keys: ["UNIFI_SHOP_USER", "UNIFI_SHOP_PASSWORD"]

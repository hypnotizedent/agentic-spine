# Tax-Legal Source Registry Contract
# Status: planned (Wave 1 design-only)
# Gap: GAP-OP-1427
# Loop: LOOP-TAXLEGAL-W1-BINDINGS-CONTRACT-PACK-20260303
# Plan: PLAN-TAX-LEGAL-OPS-WORKER-20260303

contract_id: TAXLEGAL_SOURCES_REGISTRY_V1
version: "1.0"
lifecycle: experimental
created: "2026-03-03"
owner: "@ronny"
scope: taxlegal-source-registry

description: >
  Primary-source inventory for tax-legal operations. Every source used in
  case research must be registered here with version/hash/effective-date
  metadata. Sources are the only accepted authority for citation-strict
  research outputs.

authority_references:
  agent_contract: ops/agents/tax-legal-agent.contract.md
  citation_contract: ops/bindings/taxlegal.citation.contract.yaml
  jurisdiction_profile: ops/bindings/taxlegal.jurisdiction.profile.33441.yaml

# ────────────────────────────────────────────────────────────────────────────
# REQUIRED METADATA SCHEMA
# ────────────────────────────────────────────────────────────────────────────
required_metadata:
  - field: source_id
    type: string
    description: "Unique identifier for this source entry"
    example: "IRS-PUB-334-2025"
  - field: jurisdiction
    type: string
    enum: [federal, florida_state, broward_county, deerfield_beach, other]
    description: "Jurisdiction scope of the source"
  - field: agency
    type: string
    description: "Issuing government agency"
    example: "IRS"
  - field: doc_type
    type: string
    enum: [form, instruction, publication, faq, statute, regulation, notice, ordinance, webpage, other]
    description: "Document classification"
  - field: effective_date
    type: string
    format: "YYYY-MM-DD"
    description: "Date the source content becomes effective"
  - field: last_verified
    type: string
    format: "YYYY-MM-DD"
    description: "Date the source was last verified against the official URL"
  - field: retrieved_at
    type: string
    format: "YYYY-MM-DDTHH:MM:SSZ"
    description: "Timestamp of last retrieval"
  - field: content_sha256
    type: string
    description: "SHA-256 hash of the retrieved content"
  - field: version_label
    type: string
    description: "Human-readable version label"
    example: "Rev. January 2025"
  - field: citation_anchor
    type: string
    description: "Section, page, or URL fragment for precise citation"
    example: "Chapter 2, Section 3"

optional_metadata:
  - field: supersedes_source_id
    type: string
    description: "Source ID this entry replaces (version chain)"
  - field: url
    type: string
    description: "Official URL for the source"
  - field: local_path
    type: string
    description: "Local snapshot path relative to case directory"
  - field: format
    type: string
    enum: [pdf, html, xml, json, text]
    description: "Content format of the retrieved source"

# ────────────────────────────────────────────────────────────────────────────
# SOURCE CLASSES (v1)
# ────────────────────────────────────────────────────────────────────────────
source_classes:
  - id: irs_federal
    description: "IRS forms, instructions, publications, and official FAQs"
    jurisdiction: federal
    agency: IRS
    base_url: "https://www.irs.gov"
    trust_level: primary
    verification_frequency_days: 90

  - id: florida_dor
    description: "Florida Department of Revenue official pages and forms"
    jurisdiction: florida_state
    agency: "Florida Department of Revenue"
    base_url: "https://floridarevenue.com"
    trust_level: primary
    verification_frequency_days: 90

  - id: sunbiz
    description: "Florida Division of Corporations (Sunbiz) filings and records"
    jurisdiction: florida_state
    agency: "Florida Division of Corporations"
    base_url: "https://dos.fl.gov/sunbiz"
    trust_level: primary
    verification_frequency_days: 90

  - id: broward_county
    description: "Broward County local tax/business receipt surfaces"
    jurisdiction: broward_county
    agency: "Broward County"
    base_url: "https://www.broward.org"
    trust_level: primary
    verification_frequency_days: 180

  - id: deerfield_beach
    description: "City of Deerfield Beach local licensing and tax surfaces"
    jurisdiction: deerfield_beach
    agency: "City of Deerfield Beach"
    base_url: "https://www.deerfield-beach.com"
    trust_level: primary
    verification_frequency_days: 180

  - id: fincen
    description: "FinCEN and federal guidance where applicable"
    jurisdiction: federal
    agency: FinCEN
    base_url: "https://www.fincen.gov"
    trust_level: primary
    verification_frequency_days: 180

# ────────────────────────────────────────────────────────────────────────────
# DRIFT POLICY
# ────────────────────────────────────────────────────────────────────────────
drift_policy:
  hash_check_on_sync: true
  drift_event: source_changed
  drift_impact:
    - "Changed sources invalidate cached answer confidence for impacted cases"
    - "Deadline-impact detection marks related open cases as revalidation_required"
  reindex_trigger: "Only on deterministic source drift (hash mismatch)"

# ────────────────────────────────────────────────────────────────────────────
# INGESTION POLICY
# ────────────────────────────────────────────────────────────────────────────
ingestion_policy:
  accepted_sources: primary_government_only
  ai_transcripts:
    trust_level: hypothesis
    requires_primary_verification: true
    claim_states: [unverified, verified, conflicted, rejected]
  non_primary_sources:
    trust_level: reference_only
    citation_allowed: false
    detail: "Non-primary sources may be used for context but never cited as authority"

# ────────────────────────────────────────────────────────────────────────────
# STARTER SOURCES (Planned Seed Data)
# ────────────────────────────────────────────────────────────────────────────
# These entries will be populated during Wave 2 source sync implementation.
# Schema shown here for validation reference.
sources: []

# ────────────────────────────────────────────────────────────────────────────
# PLANNED GATES
# ────────────────────────────────────────────────────────────────────────────
planned_gates:
  - id: D334
    name: taxlegal-source-registry-integrity
    purpose: "Enforce required metadata + hash fields in source registry"
    mode: report
    promote_after_clean_runs: 3

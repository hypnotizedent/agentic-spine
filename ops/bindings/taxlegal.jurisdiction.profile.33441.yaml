# Tax-Legal Jurisdiction Profile: 33441 (Deerfield Beach, FL)
# Status: planned (Wave 1 design-only)
# Gap: GAP-OP-1443
# Loop: LOOP-TAXLEGAL-W1-BUSINESS-LIFECYCLE-PLAYBOOKS-20260303
# Plan: PLAN-TAX-LEGAL-OPS-WORKER-20260303

contract_id: TAXLEGAL_JURISDICTION_33441_V1
version: "1.0"
lifecycle: experimental
created: "2026-03-03"
owner: "@ronny"
scope: taxlegal-jurisdiction-profile-33441

description: >
  Default jurisdiction profile for the 33441 ZIP code area (Deerfield Beach,
  Broward County, Florida). Defines the jurisdiction layers, agency contacts,
  filing requirements, and source registry seeds for local tax-legal operations.
  Cases outside this profile are flagged jurisdiction_out_of_profile.

authority_references:
  source_registry: ops/bindings/taxlegal.sources.registry.yaml
  lifecycle_events: ops/bindings/taxlegal.lifecycle.events.contract.yaml
  deadline_contract: ops/bindings/taxlegal.deadline.contract.yaml

# ────────────────────────────────────────────────────────────────────────────
# PROFILE IDENTITY
# ────────────────────────────────────────────────────────────────────────────
profile:
  zip_code: "33441"
  city: "Deerfield Beach"
  county: "Broward"
  state: "Florida"
  state_abbreviation: "FL"
  country: "US"

# ────────────────────────────────────────────────────────────────────────────
# JURISDICTION LAYERS
# ────────────────────────────────────────────────────────────────────────────
jurisdiction_layers:
  - id: federal
    description: "Federal tax and regulatory requirements (IRS, FinCEN)"
    applies_to_all_cases: true
    primary_agencies:
      - agency: IRS
        url: "https://www.irs.gov"
        source_class: irs_federal
      - agency: FinCEN
        url: "https://www.fincen.gov"
        source_class: fincen

  - id: florida_state
    description: "Florida state tax, corporate, and regulatory requirements"
    applies_to_all_cases: true
    primary_agencies:
      - agency: "Florida Department of Revenue"
        url: "https://floridarevenue.com"
        source_class: florida_dor
        key_filings:
          - "Sales and Use Tax (DR-15)"
          - "Corporate Income Tax (F-1120)"
          - "Reemployment Tax"
      - agency: "Florida Division of Corporations (Sunbiz)"
        url: "https://dos.fl.gov/sunbiz"
        source_class: sunbiz
        key_filings:
          - "Annual Report"
          - "Articles of Organization"
          - "Articles of Amendment"
          - "Articles of Dissolution"
          - "Registered Agent Designation"

  - id: broward_county
    description: "Broward County local tax and business licensing"
    applies_to_local_cases: true
    primary_agencies:
      - agency: "Broward County"
        url: "https://www.broward.org"
        source_class: broward_county
        key_filings:
          - "Local Business Tax Receipt"

  - id: deerfield_beach
    description: "City of Deerfield Beach local licensing and zoning"
    applies_to_local_cases: true
    primary_agencies:
      - agency: "City of Deerfield Beach"
        url: "https://www.deerfield-beach.com"
        source_class: deerfield_beach
        key_filings:
          - "Business Tax Receipt"
          - "Home Occupation Permit"
          - "Zoning Compliance"

# ────────────────────────────────────────────────────────────────────────────
# DEFAULT INTAKE RULES
# ────────────────────────────────────────────────────────────────────────────
default_intake_rules:
  - "Every case starts with federal + Florida state checks"
  - "Local layer defaults to Broward County + Deerfield Beach"
  - "Cases outside this ZIP profile are marked jurisdiction_out_of_profile"
  - "Out-of-profile cases require manual jurisdiction assignment before research"

# ────────────────────────────────────────────────────────────────────────────
# KEY RECURRING DEADLINES (33441 Profile)
# ────────────────────────────────────────────────────────────────────────────
recurring_deadlines:
  federal:
    - filing: "Federal Income Tax Return (Form 1120 or 1065)"
      frequency: annual
      typical_due: "March 15 (partnerships/S-corps) or April 15 (C-corps)"
      extension_available: true
    - filing: "Estimated Tax Payments (Form 1040-ES or 1120-W)"
      frequency: quarterly
      typical_due: "April 15, June 15, September 15, January 15"
    - filing: "FinCEN BOI Report"
      frequency: one_time_or_change
      typical_due: "Within 90 days of formation (new entities) or 30 days of change"

  florida_state:
    - filing: "Florida Annual Report"
      frequency: annual
      typical_due: "May 1"
      late_fee: "$400 after May 1"
      dissolution_risk: "Administrative dissolution if not filed by third Friday of September"
    - filing: "Sales and Use Tax (DR-15)"
      frequency: varies
      typical_due: "Monthly, quarterly, or semi-annually based on volume"
    - filing: "Reemployment Tax"
      frequency: quarterly
      typical_due: "End of month following quarter close"

  local:
    - filing: "Business Tax Receipt Renewal"
      frequency: annual
      typical_due: "September 30 (Broward County)"
    - filing: "Home Occupation Permit Renewal"
      frequency: varies
      typical_due: "Per city schedule"

# ────────────────────────────────────────────────────────────────────────────
# FORMATION CHECKLIST (33441 Profile)
# ────────────────────────────────────────────────────────────────────────────
formation_checklist:
  federal:
    - step: "Apply for EIN (Form SS-4)"
      agency: IRS
      online_url: "https://www.irs.gov/businesses/small-businesses-self-employed/apply-for-an-employer-identification-number-ein-online"
    - step: "File FinCEN BOI Report (within 90 days of formation)"
      agency: FinCEN
      online_url: "https://boiefiling.fincen.gov"
    - step: "Elect S-Corp status if desired (Form 2553, within 75 days)"
      agency: IRS
      conditional: true

  florida_state:
    - step: "File Articles of Organization with Florida DOS"
      agency: "Florida Division of Corporations"
      online_url: "https://efile.sunbiz.org"
    - step: "Designate registered agent"
      agency: "Florida Division of Corporations"
    - step: "Register for Florida sales tax (if applicable)"
      agency: "Florida Department of Revenue"
      online_url: "https://floridarevenue.com/taxes/registration"
    - step: "Register for reemployment tax (if employees)"
      agency: "Florida Department of Revenue"
      conditional: true

  local:
    - step: "Apply for Broward County Business Tax Receipt"
      agency: "Broward County"
    - step: "Apply for Deerfield Beach Business Tax Receipt"
      agency: "City of Deerfield Beach"
    - step: "Apply for Home Occupation Permit (if home-based)"
      agency: "City of Deerfield Beach"
      conditional: true
    - step: "Verify zoning compatibility"
      agency: "City of Deerfield Beach"

# ────────────────────────────────────────────────────────────────────────────
# OUT-OF-PROFILE HANDLING
# ────────────────────────────────────────────────────────────────────────────
out_of_profile:
  flag: jurisdiction_out_of_profile
  required_action: "Manual jurisdiction assignment and source registry expansion"
  detail: >
    Cases involving jurisdictions outside the 33441 profile require operator
    intervention to identify applicable agencies, filing requirements, and
    primary sources before research can proceed.

# ===============================================================================
# Inter-VLAN Firewall Baseline Contract
# ===============================================================================
# Canonical reference for the inter-VLAN firewall rule baseline.
# This file is a thin projection that references the authoritative rule
# definitions in network.vlan.firewall.baseline.yaml.
#
# Source plan: PLAN-NETWORK-SECURITY-OPS-WORKER-20260303
# Parent loop: LOOP-NETSEC-W1-VLAN-SEGMENTATION-FIREWALL-20260303
# Linked gap: GAP-OP-1455 (inter-VLAN firewall baseline)
# ===============================================================================

contract_id: NETWORK_FIREWALL_BASELINE_CONTRACT_V1
version: "1.1"
status: active
created: "2026-03-03"
activated: "2026-03-05"
owner: "@ronny"

description: >
  Contract wrapper for the inter-VLAN firewall rule baseline. The
  authoritative rule definitions, priorities, and justifications are
  maintained in network.vlan.firewall.baseline.yaml. This contract
  file provides gap traceability and summary-level governance metadata.

# ────────────────────────────────────────────────────────────────────────────
# AUTHORITY REFERENCE
# ────────────────────────────────────────────────────────────────────────────
authority:
  authoritative_source: ops/bindings/network.vlan.firewall.baseline.yaml
  authoritative_contract_id: NETWORK_VLAN_FIREWALL_BASELINE_V1
  relationship: >
    This contract delegates all rule definitions to the authoritative
    firewall baseline file. Changes to firewall rules MUST be made in
    network.vlan.firewall.baseline.yaml, not here.

# ────────────────────────────────────────────────────────────────────────────
# RULE SUMMARY
# ────────────────────────────────────────────────────────────────────────────
rule_summary:
  default_policy: DENY
  total_explicit_rules: 12
  rule_categories:
    - category: rfc1918_egress_block
      priority_range: "1000-1099"
      count: 3
      purpose: "Prevent RFC1918 address leakage to WAN"

    - category: trusted_outbound
      priority_range: "2000-2099"
      count: 3
      purpose: "Trusted VLAN access to management, servers, IoT"

    - category: server_outbound
      priority_range: "2100-2199"
      count: 3
      purpose: "Server VLAN NFS/SSH/DNS to management, HA to IoT"

    - category: iot_restrictions
      priority_range: "2200-2299"
      count: 3
      purpose: "IoT DNS-only to management, blocked to servers/trusted"

    - category: guest_isolation
      priority_range: "2300-2399"
      count: 1
      purpose: "Guest blocked to all internal VLANs"

    - category: dmz_isolation
      priority_range: "2400-2499"
      count: 2
      purpose: "DMZ blocked to all internal + observability log pull"

  dns_bypass_integration: >
    DNS bypass prevention rules (port 53/853 redirection to Pi-hole)
    are defined in network.dns.authority.contract.yaml and complement
    the inter-VLAN baseline. Both rule sets must be applied together.

# ────────────────────────────────────────────────────────────────────────────
# IMPLEMENTATION DEPENDENCIES
# ────────────────────────────────────────────────────────────────────────────
dependencies:
  - contract: NETWORK_VLAN_TOPOLOGY_V1
    requirement: "VLANs must be created before firewall rules can be applied"
  - contract: NETWORK_DNS_AUTHORITY_V1
    requirement: "DNS bypass prevention rules complement inter-VLAN baseline"

# ────────────────────────────────────────────────────────────────────────────
# PLANNED CAPABILITIES
# ────────────────────────────────────────────────────────────────────────────
planned_capabilities:
  - name: network.firewall.audit
    description: "Validate inter-VLAN rules match baseline contract"
    safety: read-only
    approval: auto
    status: active
    script: ops/plugins/network/bin/network-firewall-audit

  - name: network.firewall.apply
    description: "Apply inter-VLAN firewall rules to UniFi from baseline"
    safety: mutating
    approval: manual
    lifecycle: experimental

# ────────────────────────────────────────────────────────────────────────────
# PROPOSED GATE
# ────────────────────────────────────────────────────────────────────────────
proposed_gates:
  - id: D343
    name: netsec-firewall-baseline-lock
    description: "Enforce inter-VLAN rule presence and RFC1918 block order"
    mode: report
    promote_to_enforce_after_clean_runs: 3

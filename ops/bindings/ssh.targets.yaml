# SSH Targets Binding (SSOT)
# Non-secret. Spine-native. No monolith runtime dependency.
# Status: authoritative
# Last verified: 2026-03-05
#
# Access policy: LAN-first for same-site (shop) targets.
# Tailscale reserved for cross-site paths (home, NAS).
# `host` is the preferred operational IP (what scripts resolve via yq .host).
# `tailscale_ip` is the Tailscale CGNAT IP for cross-site or fallback use.
# Human-facing workbench SSH config is generated from this binding and may project
# lan_first targets to Tailscale IPs for location-agnostic operator access.
#
# Remote Probe Resolution Policy (D321):
#   All diagnostic/status capabilities that SSH or HTTP-probe remote hosts MUST
#   resolve targets through ops/lib/ssh-resolve.sh (ssh_resolve_host_with_fallback
#   or ssh_resolve_url_with_fallback). Direct hardcoded LAN IP assignment is
#   prohibited. Unmapped targets (no SSH target entry) are passed through unchanged
#   and flagged as "unmapped" in output. Gate D321 enforces this invariant.

ssh:
  defaults:
    user: "root"
    port: 22
    connect_timeout_sec: 5
    batch_mode: true
    # Avoid HOME drift (no known_hosts writes):
    strict_host_key_checking: "no"
    user_known_hosts_file: "/dev/null"

  targets:
    # ─── Shop VMs (LAN-first: host=lan_ip) ───

    - id: "docker-host"
      host: "192.168.1.200"
      tailscale_ip: "100.92.156.118"
      user: "docker-host"
      access_policy: lan_first
      description: "Legacy docker-host VM 200. Tombstoned 2026-03-06; keep for forensic SSH only."
      tags: ["docker", "legacy", "forensic"]


mail_archiver:
  loop_id: LOOP-MAIL-ARCHIVER-COMMS-MIGRATION-20260225
  monitoring:
    machine_status_target:
      ssh_target: communications-stack
      mode: openssh_batch_via_tailscale_ip
      require_noninteractive: true
    human_interactive_target:
      ssh_target: communications-stack
      mode: tailscale_ssh_interactive
    blocked_auth_state:
      lane_state: BLOCKED_AUTH
      retry_allowed: false
      state_file: mailroom/state/communications/mail-archiver-import-monitor.state.yaml
    single_flight:
      lock_file: mailroom/state/locks/mail-archiver-import-monitor.lock
  governance_contracts:
    account_linkage: ops/bindings/mail.archiver.account.linkage.contract.yaml
    backup_restore: ops/bindings/mail.archiver.backup.contract.yaml
    retention_lifecycle: ops/bindings/mail.archiver.retention.contract.yaml
    backup_schedule: ops/bindings/backup.schedule.yaml
  database:
    engine: postgresql
    container: mail-archiver-db
    db_name: "MailArchiver"
    db_schema: "mail_archiver"
    db_user: "mailuser"
    db_password_ref: infisical://spine/services/mail-archiver/MAIL_ARCHIVER_DB_PASSWORD
    host: localhost
    port: 5432
    note: "db_name is case-sensitive (MailArchiver, not mailarchiver). Connect string: Host=mail-archiver-db;Database=MailArchiver;Username=mailuser"
  software_identity:
    image: s1t5/mailarchiver:latest
    runtime_entrypoint: "dotnet MailArchiver.dll"
    source_compose_file: /opt/stacks/communications-stack/docker-compose.yml
    source_import_mount: /opt/stacks/communications-stack/data/mail-archiver/import:/import:ro
    locked_at: "2026-02-25T18:59:00Z"
    verification_method: "ssh communications-stack + docker inspect/logs evidence"
  mbox_takeout_source:
    ssh_target: docker-host
    vm_id: "200"
    absolute_path: /mnt/docker/mail-archive-import/All-mail.mbox
    file_size_bytes: 189440618235
    locked_at: "2026-02-25T18:59:00Z"
    verification_method: "ssh docker-host + filesystem scan evidence"
  provider_type_enum:
    description: "Valid ProviderType values for mail-archiver MailAccounts.ProviderType column."
    note: "Use exact enum string. 'MICROSOFT' is NOT valid; use 'M365'. Enum is checked by the .NET EF model."
    critical_warning: "Using an invalid enum value (e.g. 'MICROSOFT' instead of 'M365') crashes the app with an enum parse error that breaks ALL account sync, not just the misconfigured account. Always validate against this list before writing to the DB."
    gap_ref: "GAP-OP-1270"
    regression_gate_status: pending
    regression_gate_note: "Needs a dedicated drift gate to validate ProviderType values in the DB match this enum. Gate creation deferred to orchestrator."
    values:
      - IMAP
      - M365
      - Gmail
    examples:
      imap_generic: "IMAP"
      microsoft_365: "M365"
      gmail: "Gmail"
    invalid_values_observed:
      - value: "MICROSOFT"
        result: "enum parse error, crashes ALL sync"
      - value: "Google"
        result: "enum parse error (case-sensitive)"
      - value: "EWS"
        result: "unknown — not tested, not in .NET EF model"
  recovery:
    ef_migration_lock:
      description: "Container restart can hang on EF migration lock if prior run was interrupted."
      symptoms:
        - "mail-archiver container starts but hangs during startup with no log output"
        - "docker logs shows 'Applying migration...' with no completion"
      procedure:
        - "1. Stop mail-archiver app container: docker stop mail-archiver"
        - "2. Restart the database container: docker restart mail-archiver-db"
        - "3. Wait 10s for PostgreSQL to recover and release advisory locks"
        - "4. Start app container: docker start mail-archiver"
      note: "If step 4 still hangs, connect to DB and run: SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'MailArchiver' AND state = 'idle in transaction';"
  storage_invariants:
    nonboot_root: /srv/mail-archiver
    drift_gate: D233
    required_bind_mounts:
      - container: mail-archiver
        destination: /app/uploads
        source_prefix: /srv/mail-archiver/uploads
      - container: mail-archiver
        destination: /tmp
        source_prefix: /srv/mail-archiver/tmp
      - container: mail-archiver-db
        destination: /var/lib/postgresql/data
        source_prefix: /srv/mail-archiver/postgres-data


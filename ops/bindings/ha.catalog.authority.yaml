# HA Catalog Authority V1
# Cataloging HA integrations, add-ons, and HACS inventory as a unified
# authority surface. Consolidates probe evidence from session.start into
# a single reference file for component counts, entity health, add-on
# versions, HACS repos, and service domain coverage.
#
# Status: experimental
# Owner: @ronny
# Gap: GAP-OP-1359


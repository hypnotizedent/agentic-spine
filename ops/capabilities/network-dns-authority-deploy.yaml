capability:
  name: network.dns.authority.deploy
  lifecycle: planned
  description: >
    Deploy and configure the DNS authority stack: Unbound recursive
    resolver, cloudflared DoH fallback proxy, Pi-hole upstream
    reconfiguration, and DNS bypass prevention firewall rules.

  safety: mutating
  approval: manual
  domain: network
  plane: fabric

  contract: ops/bindings/network.dns.authority.contract.yaml

  implementation:
    status: not_started
    script: null
    language: bash
    estimated_complexity: medium
    notes: >
      Will SSH to Pi-hole host (LXC 105 home, VM 204 shop), install
      Unbound + cloudflared via apt, deploy config files, reconfigure
      Pi-hole upstream, and apply UniFi firewall rules via API.

  prerequisites:
    - "Pi-hole host accessible via SSH"
    - "UniFi API credentials in Infisical"
    - "Operator approval for DNS chain change"
    - "Contract NETWORK_DNS_AUTHORITY_V1 approved"

  outputs:
    - "Unbound running on target host (port 5335)"
    - "cloudflared running on target host (port 5053)"
    - "Pi-hole upstream set to 127.0.0.1#5335"
    - "DNS bypass firewall rules active on UDR"

  rollback:
    description: >
      Revert Pi-hole upstream to public resolvers (1.1.1.1, 8.8.8.8),
      stop Unbound and cloudflared services, remove firewall rules.
    risk: low

  related_capabilities:
    - network.dns.authority.status
    - network.dns.bypass.test
    - network.dns.local.populate

capability:
  name: stack.discovery.query
  lifecycle: planned
  description: >
    Semantic search against the stack discovery knowledge base. Agents
    provide a natural language query about self-hosted tools and receive
    ranked results with tool name, description, URL, categories, relevance
    score, and whether the tool is already deployed locally.

  safety: read-only
  approval: auto
  domain: none
  plane: fabric

  contract: ops/bindings/stack.discovery.knowledge.contract.yaml

  implementation:
    status: not_started
    script: null
    language: python
    estimated_complexity: medium
    notes: >
      Embeds the query using the same model as the index pipeline,
      performs similarity search against the vector store, cross-references
      results with SERVICE_REGISTRY for already_deployed flag, and returns
      ranked JSON output. May leverage AnythingLLM workspace or dedicated
      ChromaDB/LanceDB instance.

  prerequisites:
    - "Knowledge base index populated (stack.discovery.refresh run at least once)"
    - "Embedding model available (local preferred)"
    - "Vector store operational"

  input:
    format: "Natural language query string"
    examples:
      - "What self-hosted tools exist for password management?"
      - "Alternatives to Notion for self-hosted note taking?"
      - "Self-hosted monitoring and alerting"
      - "DNS filtering and ad blocking solutions"

  output:
    format: "JSON array of ranked results"
    fields:
      - field: tool_name
        type: string
        description: "Name of the tool"
      - field: description
        type: string
        description: "Brief description of the tool"
      - field: url
        type: string
        description: "Project URL"
      - field: categories
        type: "string[]"
        description: "Categorization tags"
      - field: score
        type: float
        description: "Relevance score (0.0-1.0)"
      - field: already_deployed
        type: boolean
        description: "True if found in local SERVICE_REGISTRY"
      - field: source_id
        type: string
        description: "Which source catalog this entry came from"
    max_results: 10

  related_capabilities:
    - stack.discovery.refresh
    - stack.discovery.sources.add
    - stack.discovery.sources.list
    - rag.anythingllm.ask

capability:
  name: network.vlan.topology.apply
  lifecycle: planned
  description: >
    Create and configure VLANs in UniFi controller to match the topology
    contract. Includes VLAN creation, subnet assignment, DHCP configuration,
    WiFi SSID-to-VLAN mapping, and switch port assignment.

  safety: mutating
  approval: manual
  domain: network
  plane: fabric

  contract: ops/bindings/network.vlan.topology.contract.yaml

  implementation:
    status: not_started
    script: null
    language: bash
    estimated_complexity: high
    notes: >
      Uses UniFi API to create networks, assign VLAN IDs, configure
      DHCP scopes, and map WiFi SSIDs. Switch port assignment requires
      physical presence for verification (Phase 3 blocker).

  prerequisites:
    - "UniFi API credentials in Infisical"
    - "Physical home site visit for switch port changes"
    - "Contract NETWORK_VLAN_TOPOLOGY_V1 approved"
    - "Operator approval for network topology change"
    - "Rollback plan documented and tested"

  outputs:
    - "6 VLANs created in UniFi (management, servers, trusted, iot, guest, dmz)"
    - "Subnets and DHCP configured per contract"
    - "WiFi SSIDs mapped to VLANs"
    - "Switch ports assigned to VLANs"

  rollback:
    description: >
      Remove VLANs from UniFi, restore flat network. All devices return
      to default network. Risk of brief connectivity loss during rollback.
    risk: high

  blockers:
    - "Home site physical visit required for Phase 3 (switch ports)"
    - "GAP-OP-1030 (original VLAN gap) must be absorbed"

  related_capabilities:
    - network.vlan.status
    - network.firewall.audit
    - network.firewall.apply
    - network.mdns.status

# Service Onboarding Contract v1.0
# Authority: SPINE-CONTROL-01 onboarding-normalization lane
# Purpose: Define the boring onboarding standard for new services
# Scope: Minimal normalization pass — no framework/provisioning engine

contract_id: SERVICE_ONBOARDING_CONTRACT_V1
version: "1.0"
status: active
owner: "@ronny"
created: "2026-03-05"
last_verified: "2026-03-05"

# ═══════════════════════════════════════════════════════════════
# THE BORING ONBOARDING STANDARD
# ═══════════════════════════════════════════════════════════════
#
# For ANY new service, this contract requires explicit answers to:

boring_onboarding_checklist:
  - question: "service_id"
    description: "What is the service called? (lowercase, hyphens, no underscores)"
    examples: ["frigate", "go2rtc", "vaultwarden", "jellyfin"]

  - question: "runtime_host"
    description: "Where does it run?"
    examples: ["surveillance-stack", "download-stack", "infra-core"]
    authority: "docs/governance/DEVICE_IDENTITY_SSOT.md + docs/governance/SERVICE_REGISTRY.yaml"

  - question: "canonical_secret_namespace"
    description: "Does it need machine secrets in Infisical? If yes, what path?"
    options:
      - "no machine secrets needed (blank)"
      - "existing namespace path (e.g., /spine/shop/nvr)"
      - "new namespace path (add to secrets.namespace.policy.yaml first)"
    authority: "ops/bindings/secrets.namespace.policy.yaml"
    policy: "New services MUST NOT write to deprecated/legacy Infisical projects"
    deprecated_projects: ["home-assistant", "finance-stack", "mint-os-vault"]

  - question: "required_machine_keys"
    description: "List specific machine secret keys (if canonical_secret_namespace is not blank)"
    examples: ["NVR_ADMIN_USER", "NVR_ADMIN_PASSWORD", "CLOUDFLARE_API_TOKEN"]
    authority: "ops/bindings/secrets.namespace.policy.yaml (key_path_overrides or required_key_paths)"

  - question: "consumer_path"
    description: "How do scripts retrieve machine secrets?"
    options:
      - "infisical-agent.sh (Bash scripts)"
      - "secrets-exec (Python/Node.js services via wrapper)"
      - "n/a (no machine secrets)"
    authority: "ops/tools/infisical-agent.sh (canonical consumer)"
    policy: "NEVER use infisical CLI directly. NEVER inline auth tokens in scripts."

  - question: "sanctioned_admin_url"
    description: "What is the human-facing admin URL?"
    options:
      - "public canonical URL (e.g., https://service.ronny.works)"
      - "sanctioned private hostname (e.g., http://surveillance-stack:5000)"
      - "blank (no admin surface / internal-only)"
    policy_rules:
      - "Raw IP URLs are NOT acceptable as canonical admin URLs"
      - "If a public canonical URL exists, use that"
      - "If no public URL exists but the service is intentionally internal/admin-only, use a sanctioned private hostname"
      - "If no sanctioned hostname exists, leave blank rather than storing a raw IP"
    authority: "ops/data/vaultwarden/canonical_hosts.yaml (if Vaultwarden entry exists)"

  - question: "vaultwarden_entry_required"
    description: "Does this service belong in Vaultwarden as a human/admin surface?"
    options:
      - "yes (if there is a real admin login/UI with human credentials)"
      - "no (if there is no credentialed human surface worth storing)"
    authority: "ops/data/vaultwarden/canonical_hosts.yaml"

  - question: "smoke_check_command"
    description: "How do you verify the service is healthy?"
    examples:
      - "curl http://surveillance-stack:5000/api/version"
      - "./bin/ops cap run surveillance.stack.status"
      - "ssh surveillance-stack docker ps | grep frigate"
    authority: "ops/bindings/services.health.yaml (HTTP probes) OR capability script"

# ═══════════════════════════════════════════════════════════════
# POLICY DECISIONS
# ═══════════════════════════════════════════════════════════════

policy:
  canonical_namespace_on_first_write:
    rule: "New services MUST define their canonical namespace BEFORE first secret write"
    enforcement: "infisical-agent.sh guard_deprecated_write() blocks writes to deprecated projects"

  consumer_path_rule:
    rule: "Machine secrets MUST be retrieved only through infisical-agent.sh or secrets-exec"
    prohibited:
      - "infisical CLI direct usage"
      - "inline INFISICAL_TOKEN in scripts"
      - "hardcoded API tokens"

  admin_url_rule:
    rule: "Raw IP URLs are not acceptable as canonical admin URLs"
    rationale: "IPs drift, hostnames are stable and governed"
    acceptable:
      - "public canonical URL (e.g., https://service.ronny.works via Cloudflare tunnel)"
      - "sanctioned private hostname (e.g., http://surveillance-stack:5000 from ssh.targets.yaml)"
      - "blank (if no admin surface exists)"

  vaultwarden_inclusion_rule:
    rule: "Vaultwarden entries are for human/admin credentials only"
    yes_if:
      - "service has a web UI with username/password login"
      - "credentials are used by humans (not machines)"
    no_if:
      - "service has no admin login"
      - "service uses API keys only (store in Infisical, not Vaultwarden)"
      - "service is internal-only with no authentication"

  legacy_project_rule:
    rule: "New services MUST NOT write into legacy/deprecated Infisical projects"
    deprecated_projects: ["home-assistant", "finance-stack", "mint-os-vault"]
    active_project: "infrastructure (ID: 01ddd93a-e0f8-4c7c-ad9f-903d76ef94d9)"
    enforcement: "infisical-agent.sh is_deprecated_project() + guard_deprecated_write()"
    migration_path: "Use ops/bindings/secrets.namespace.policy.yaml to route keys to /spine/* namespaces"

# ═══════════════════════════════════════════════════════════════
# EXEMPLAR: surveillance / Frigate
# ═══════════════════════════════════════════════════════════════

exemplar_surveillance_frigate:
  service_id: "frigate"
  runtime_host: "surveillance-stack"
  canonical_secret_namespace: "/spine/shop/nvr"
  required_machine_keys:
    - "NVR_ADMIN_USER"
    - "NVR_ADMIN_PASSWORD"
  consumer_path: "secrets-exec (via docker-compose .env file sourced from Infisical)"
  sanctioned_admin_url: "http://surveillance-stack:5000"
  sanctioned_admin_url_note: "Internal-only by design per ops/bindings/surveillance.topology.contract.yaml. No public URL."
  vaultwarden_entry_required: false
  vaultwarden_rationale: "Frigate has no admin login UI — it uses MQTT/API integration with Home Assistant. NVR credentials are machine secrets (Infisical), not human credentials (Vaultwarden)."
  smoke_check_command: "./bin/ops cap run surveillance.stack.status"
  smoke_check_note: "Capability probes Frigate API health, camera stats, disk usage, go2rtc bundled API."

exemplar_surveillance_go2rtc:
  service_id: "go2rtc"
  runtime_host: "surveillance-stack"
  canonical_secret_namespace: ""
  canonical_secret_namespace_note: "No machine secret namespace required. go2rtc is bundled inside Frigate 0.17+ and proxied through Frigate nginx. Configuration via go2rtc.yaml volume mount only."
  required_machine_keys: []
  consumer_path: "n/a"
  sanctioned_admin_url: ""
  sanctioned_admin_url_note: "No separate admin URL. Bundled inside Frigate; API proxied at http://surveillance-stack:5000/api/go2rtc/"
  vaultwarden_entry_required: false
  vaultwarden_rationale: "go2rtc has no admin login. It is a low-latency RTSP/WebRTC proxy with no authentication surface."
  smoke_check_command: "./bin/ops cap run surveillance.stack.status"
  smoke_check_note: "Capability includes go2rtc health check (Frigate-proxied API or standalone fallback)."

# ═══════════════════════════════════════════════════════════════
# LEGACY AMBIGUITY CLEANUP
# ═══════════════════════════════════════════════════════════════

legacy_ambiguity_cleaned:
  issue: "Deprecated Infisical projects can still be read with --allow-deprecated-read flag"
  risk: "Agents might accidentally reference deprecated projects when onboarding new services"
  cleanup: "Explicit policy added to boring_onboarding_checklist + policy.legacy_project_rule"
  enforcement: "infisical-agent.sh guard_deprecated_write() blocks all mutating operations"
  guidance: "ops/bindings/secrets.namespace.policy.yaml is the single source of truth for new service routing"

# ═══════════════════════════════════════════════════════════════
# WHY THIS STAYS LEAN
# ═══════════════════════════════════════════════════════════════

design_constraints:
  no_new_gates: "This contract does NOT introduce new drift gates. Existing gates (D351, D112, etc.) enforce patterns."
  no_new_loops: "This contract does NOT require loop creation. It is a reference contract for agents."
  no_broad_rewrite: "This contract does NOT trigger a mass service migration. It defines the standard for NEW services."
  no_framework: "This contract does NOT build a provisioning engine. It documents the boring transaction."
  no_matrix_sprawl: "This contract does NOT enumerate all existing services. Surveillance is the exemplar; other services follow on-demand."
  no_follow_on_proof: "This contract does NOT require follow-on validation waves. The exemplar (surveillance/Frigate) is sufficient proof."

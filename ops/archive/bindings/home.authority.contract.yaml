contract: HOME_AUTHORITY_CONTRACT_V1
version: "1.1"
status: active
created: "2026-03-02"
updated: "2026-03-04"
authority_loop: LOOP-HOME-CANONICAL-REALIGNMENT-20260302
description: "Authority contract for Home infrastructure domain"

domain:
  id: home
  label: "Home Infrastructure"
  owner: "@ronny"
  location: home
  access_model: "remote_via_tailscale_and_proxmox_proxy"

boundaries:
  network:
    primary_gateway: "10.0.0.1"
    ha_host: "10.0.0.100"
    ha_port: 8123
    z2m_coordinator: "10.0.0.51"
    z2m_coordinator_port: 6638
    tailscale_access: true
    note: "Home runtime is reachable via Tailscale + proxmox-home relay for UniFi LAN APIs."

  services:
    - id: home-assistant
      host: "10.0.0.100"
      port: 8123
      protocol: http
      auth: bearer_token
      credential_path: "/spine/home/HA_API_TOKEN"
    - id: zigbee2mqtt
      host: "10.0.0.100"
      access_via: home-assistant
      note: "Z2M accessed through HA integration + add-on runtime."
    - id: unifi-controller
      host: "10.0.0.1"
      port: 443
      access_via: proxmox-home
      note: "UDR7 controller API proxied through proxmox-home."

  verify_ring:
    ring_name: home-runtime
    gates: [D113, D114, D115, D118, D119, D120]
    skip_condition: "HA unreachable"
    isolation_from: spine-core-fast

inventories:
  - path: ops/bindings/home.hardware.inventory.yaml
    scope: physical_devices
  - path: ops/bindings/home.unifi.network.inventory.yaml
    scope: network_equipment
  - path: ops/bindings/home.proxmox.inventory.yaml
    scope: compute_nodes
  - path: ops/bindings/home.zigbee.reliability.baseline.yaml
    scope: zigbee_reliability
  - path: ops/bindings/home.assistant.catalog.snapshot.yaml
    scope: ha_integrations
  - path: ops/bindings/home.automation.registry.yaml
    scope: ha_automations
  - path: ops/bindings/home.dashboard.registry.yaml
    scope: ha_dashboards

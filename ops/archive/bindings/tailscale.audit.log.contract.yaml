# Tailscale Audit Log Collection Contract
# Authority: docs/CANONICAL/TAILSCALE_AUTHORITY_CONTRACT_V1.yaml
# Gap: GAP-OP-1260
# Status: planned (blocked on log destination and absent API)
# Loop: LOOP-TAILSCALE-INTEGRATION-DEFERRED-ACTIONS-20260302
# Plan: PLAN-TAILSCALE-INTEGRATION-DEFERRED-ACTIONS

status: planned
owner: "@ronny"
created: "2026-03-03"
last_verified: "2026-03-03"
scope: tailscale-audit-log-collection-and-streaming
version: "1.0"

summary: |
  Contract governing the collection, storage, and retention of Tailscale
  audit logs. The Tailscale audit log API does NOT exist (404 on /logging
  and /log-stream endpoints). Configuration is admin-console-only.
  This contract defines the target architecture so deployment can proceed
  once the log destination infrastructure is provisioned.

authority_references:
  tailscale_authority: "docs/CANONICAL/TAILSCALE_AUTHORITY_CONTRACT_V1.yaml"
  operator_actions: "mailroom/state/tailscale-audit/operator-actions-20260302.yaml"
  operator_action_id: OP-TS-002

api_status:
  programmatic_api_available: false
  verified_at: "2026-03-02"
  endpoints_checked:
    - endpoint: "GET /api/v2/tailnet/{tailnet}/logging"
      result: 404
    - endpoint: "GET /api/v2/tailnet/{tailnet}/log-stream"
      result: 404
  conclusion: "No programmatic API for audit log streaming. Admin console only."
  admin_console_url: "https://admin.tailscale.com/admin/settings/logs"

collection_strategy:
  primary:
    label: admin_console_streaming
    description: "Configure audit log streaming via Tailscale admin console"
    method: manual_admin_console
    automation_possible: false
    steps:
      - "Navigate to https://admin.tailscale.com/admin/settings/logs"
      - "Select streaming destination type"
      - "Provide destination credentials (Loki push URL or S3 bucket)"
      - "Set format to JSON"
      - "Enable streaming"
      - "Verify first log entry arrives at destination"
    detail:
      - "This is a one-time manual configuration"
      - "Streaming persists until manually disabled"
      - "No drift detection possible via API -- monitor log arrival freshness instead"
  future_alternative:
    label: api_streaming
    description: "If Tailscale adds a streaming API in the future, migrate to API-driven configuration"
    status: blocked
    migration_trigger: "Tailscale API returns 2xx on /logging or /log-stream endpoints"

log_destination:
  primary:
    label: grafana_loki
    host: "observability-stack (VM 205, 192.168.1.115)"
    type: loki
    push_url: "http://192.168.1.115:3100/loki/api/v1/push"
    rationale: "Grafana Loki already deployed on observability-stack; centralizes log aggregation"
    query_interface: "Grafana dashboard at grafana.ronny.works"
    label_scheme:
      job: tailscale-audit
      source: tailscale
      tailnet: taile9480.ts.net
  fallback:
    label: s3_bucket
    type: s3_compatible
    rationale: "Use if Loki is unavailable or if long-term archival storage is needed"
    detail:
      - "MinIO on observability-stack or AWS S3"
      - "Requires separate ingestion pipeline to make logs queryable"

log_format:
  format: json
  fields:
    - field_name: timestamp
      type: datetime
      description: "Event occurrence time (ISO 8601)"
    - field_name: actor
      type: string
      description: "User or service account that performed the action"
    - field_name: action
      type: string
      description: "Action performed (e.g., device.approve, acl.update, user.invite)"
    - field_name: target
      type: object
      description: "Target resource affected by the action"
    - field_name: origin
      type: string
      description: "IP address or control plane identifier"
  detail:
    - "Exact field schema depends on Tailscale streaming format version"
    - "JSON format preserves full event structure for indexing and querying"

retention_policy:
  hot_storage:
    duration_days: 30
    location: grafana_loki
    purpose: "Active investigation and recent audit queries"
  warm_storage:
    duration_days: 90
    location: loki_compacted
    purpose: "Extended lookback for compliance and incident response"
  archive:
    duration_days: 365
    location: "TBD -- S3 or local NFS archive"
    purpose: "Long-term retention for regulatory or forensic needs"
  deletion_policy: "Automatic expiry per tier; no manual deletion without operator approval"

monitoring:
  freshness_check:
    description: "Verify audit logs are arriving at destination within expected freshness window"
    method: "Query Loki for most recent tailscale-audit log entry"
    max_staleness_minutes: 60
    alert_on_stale: true
    check_command: "TBD -- Grafana alert rule or scheduled capability"
  volume_baseline:
    expected_events_per_day: "10-100 (varies with tailnet activity)"
    alert_on_zero_events_hours: 24
    detail: "Zero events for 24h may indicate streaming failure or admin console misconfiguration"

drift_detection:
  api_based: false
  workaround:
    method: log_freshness_monitoring
    description: "Since no API exists to verify streaming config, detect drift by monitoring log arrival"
    signals:
      - "Log freshness exceeds max_staleness_minutes threshold"
      - "Zero events received for alert_on_zero_events_hours"
    response:
      - "Alert operator to check admin console streaming configuration"
      - "Verify destination connectivity (Loki push endpoint reachable)"
  future_gate:
    description: "If API becomes available, create a drift gate comparing API state to contract"
    status: planned

deployment_checklist:
  prerequisites:
    - id: AUDIT-PRE-1
      description: "Confirm observability-stack (VM 205) is healthy"
      command: "ssh observability@192.168.1.115 uptime"
      status: pending
    - id: AUDIT-PRE-2
      description: "Confirm Grafana Loki is running and accepting pushes"
      command: "curl -s http://192.168.1.115:3100/ready"
      status: pending
      depends_on: AUDIT-PRE-1
    - id: AUDIT-PRE-3
      description: "Create Loki label/tenant for tailscale-audit logs"
      status: pending
      depends_on: AUDIT-PRE-2
  configuration_steps:
    - id: AUDIT-CFG-1
      description: "Configure streaming in Tailscale admin console"
      admin_url: "https://admin.tailscale.com/admin/settings/logs"
      method: manual
      depends_on: AUDIT-PRE-3
    - id: AUDIT-CFG-2
      description: "Verify first log entry arrives at Loki"
      depends_on: AUDIT-CFG-1
    - id: AUDIT-CFG-3
      description: "Create Grafana dashboard for Tailscale audit logs"
      depends_on: AUDIT-CFG-2
    - id: AUDIT-CFG-4
      description: "Configure freshness alert rule in Grafana"
      depends_on: AUDIT-CFG-3

blockers:
  - id: AUDIT-BLOCK-1
    description: "No Tailscale API for audit log streaming configuration"
    gap_ref: GAP-OP-1260
    severity: low
    type: external_dependency
    resolution: "Monitor Tailscale API changelog; use admin console as workaround"
  - id: AUDIT-BLOCK-2
    description: "Log destination (Grafana Loki) not yet configured for tailscale-audit ingestion"
    gap_ref: GAP-OP-1260
    severity: low
    resolution: "Provision Loki label/tenant on observability-stack (VM 205)"

capability_binding:
  existing: tailscale.audit.status
  planned_capabilities:
    - id: tailscale.audit.log.freshness
      lifecycle: experimental
      description: "Check audit log freshness by querying Loki for most recent entry"
      safety: read-only
    - id: tailscale.audit.log.query
      lifecycle: experimental
      description: "Query Tailscale audit logs from Loki by time range, actor, or action"
      safety: read-only

gate_policy:
  planned_gate: "TBD -- audit log freshness enforcement gate"
  mode: report
  promote_after_clean_runs: 3

# Tax-Legal Enforcement Response Contract
# Status: planned (Wave 1 design-only)
# Gap: GAP-OP-1442
# Loop: LOOP-TAXLEGAL-W1-BUSINESS-LIFECYCLE-PLAYBOOKS-20260303
# Plan: PLAN-TAX-LEGAL-OPS-WORKER-20260303

contract_id: TAXLEGAL_ENFORCEMENT_RESPONSE_V1
version: "1.0"
lifecycle: experimental
created: "2026-03-03"
owner: "@ronny"
scope: taxlegal-enforcement-response

description: >
  Code-enforcement, zoning, and regulatory response workflow contract.
  Defines the intake, assessment, response drafting, and corrective action
  lifecycle for enforcement notices. All responses require human review
  and attorney sign-off before submission.

authority_references:
  agent_contract: ops/agents/tax-legal-agent.contract.md
  boundary_contract: docs/governance/TAX_LEGAL_AGENT_BOUNDARY.md
  case_lifecycle: ops/bindings/taxlegal.case.lifecycle.contract.yaml
  lifecycle_events: ops/bindings/taxlegal.lifecycle.events.contract.yaml
  jurisdiction_profile: ops/bindings/taxlegal.jurisdiction.profile.33441.yaml

# ────────────────────────────────────────────────────────────────────────────
# ENFORCEMENT NOTICE TYPES
# ────────────────────────────────────────────────────────────────────────────
notice_types:
  - id: code_enforcement
    description: "Municipal code enforcement notice or violation"
    typical_response_window_days: 30
    issuing_agencies: [deerfield_beach, broward_county]
    severity_range: [low, medium, high, critical]

  - id: zoning_violation
    description: "Zoning ordinance violation notice"
    typical_response_window_days: 30
    issuing_agencies: [deerfield_beach, broward_county]
    severity_range: [medium, high, critical]

  - id: business_license_deficiency
    description: "Business license or permit deficiency notice"
    typical_response_window_days: 14
    issuing_agencies: [deerfield_beach, broward_county, florida_state]
    severity_range: [low, medium, high]

  - id: tax_notice
    description: "Tax deficiency, delinquency, or audit notice"
    typical_response_window_days: 30
    issuing_agencies: [irs, florida_dor, broward_county]
    severity_range: [medium, high, critical]

  - id: regulatory_inquiry
    description: "General regulatory inquiry or information request"
    typical_response_window_days: 14
    issuing_agencies: [any]
    severity_range: [low, medium]

# ────────────────────────────────────────────────────────────────────────────
# RESPONSE WORKFLOW
# ────────────────────────────────────────────────────────────────────────────
response_workflow:
  stages:
    - id: notice_intake
      description: "Receive and digitize enforcement notice"
      required_actions:
        - "Scan/photograph original notice"
        - "Extract notice date, case number, violation description, response deadline"
        - "Create case with type enforcement_remediation"
        - "Register notice as source in case source registry"
      required_artifacts:
        - notice_scan_or_photo
        - intake.md with extracted metadata

    - id: assessment
      description: "Research applicable ordinances/regulations and assess merit"
      required_actions:
        - "Identify cited ordinance or regulation"
        - "Retrieve primary source from source registry"
        - "Assess factual accuracy of violation claims"
        - "Classify severity and response urgency"
      required_artifacts:
        - research/assessment.md with citations
        - risk/risk-classification.yaml

    - id: response_drafting
      description: "Draft formal response to enforcement notice"
      required_actions:
        - "Draft response letter with citation-backed arguments"
        - "Include corrective action plan if violation is confirmed"
        - "Include dispute evidence if violation is contested"
        - "Flag for attorney review"
      required_artifacts:
        - drafts/response-letter.md
        - drafts/corrective-action-plan.md (if applicable)
      human_review_required: true

    - id: attorney_review
      description: "Attorney review and sign-off on response"
      required_actions:
        - "Attorney reviews response letter and supporting evidence"
        - "Attorney provides sign-off or revision requests"
        - "Risk classification updated based on attorney input"
      required_artifacts:
        - drafts/attorney-cpa-memo.md
        - receipt.md (review evidence)
      human_review_required: true

    - id: response_submission
      description: "Submit approved response to issuing agency"
      required_actions:
        - "Operator submits response via required channel (mail, portal, in-person)"
        - "Record submission receipt with timestamp"
        - "Set follow-up deadline for agency response"
      required_artifacts:
        - submission_receipt
      operator_action_required: true

    - id: corrective_action
      description: "Execute corrective actions per approved plan"
      required_actions:
        - "Complete each corrective action item"
        - "Document completion evidence (photos, receipts, confirmations)"
        - "Verify compliance with cited ordinance"
      required_artifacts:
        - corrective_action_evidence per item

    - id: case_closure
      description: "Confirm enforcement case is resolved"
      required_actions:
        - "Obtain closure confirmation from issuing agency"
        - "Update case status to closed"
        - "Apply retention policy"
      required_artifacts:
        - agency_closure_confirmation
        - receipt.md (final)

# ────────────────────────────────────────────────────────────────────────────
# ESCALATION POLICY
# ────────────────────────────────────────────────────────────────────────────
escalation_policy:
  response_deadline_tracking:
    - days_remaining: 14
      action: "Active warning to operator"
      notification: active
    - days_remaining: 7
      action: "Urgent escalation, attorney review expedited"
      notification: immediate
    - days_remaining: 3
      action: "Critical escalation, all related activity on manual hold"
      notification: immediate
    - days_remaining: 0
      action: "Overdue incident filed, penalty risk assessment"
      notification: immediate

  severity_escalation:
    high:
      initial_action: "Attorney consultation within 3 business days"
      review_sla: "2 business days"
    critical:
      initial_action: "Same-day attorney consultation"
      review_sla: "Same day"

# ────────────────────────────────────────────────────────────────────────────
# EVIDENCE REQUIREMENTS
# ────────────────────────────────────────────────────────────────────────────
evidence_requirements:
  notice_intake:
    - original notice (scan or photo)
    - notice metadata (date, case number, agency, violation)
  assessment:
    - cited ordinance/regulation primary source
    - factual assessment with citations
  response:
    - response letter with citation anchors
    - corrective action plan (if applicable)
  submission:
    - submission receipt with timestamp and method
  corrective_action:
    - per-item completion evidence
  closure:
    - agency closure confirmation or resolution letter

# ────────────────────────────────────────────────────────────────────────────
# BOUNDARY CONSTRAINTS
# ────────────────────────────────────────────────────────────────────────────
boundary_constraints:
  - "Agent drafts response only; never submits directly to agency"
  - "Attorney review is mandatory before any response submission"
  - "Agent does not advise on legal strategy; presents researched options with citations"
  - "All dispute arguments must be citation-backed to primary sources"
  - "Corrective action execution is operator responsibility, not agent action"

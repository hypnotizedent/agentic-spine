# Tax-Legal Privacy Contract
# Status: planned (Wave 1 design-only)
# Gap: GAP-OP-1429
# Loop: LOOP-TAXLEGAL-W1-BINDINGS-CONTRACT-PACK-20260303
# Plan: PLAN-TAX-LEGAL-OPS-WORKER-20260303

contract_id: TAXLEGAL_PRIVACY_V1
version: "1.0"
lifecycle: experimental
created: "2026-03-03"
owner: "@ronny"
scope: taxlegal-privacy-controls

description: >
  Privacy and PII handling contract for tax-legal operations. Defines PII
  classes, redaction modes, log policies, and secret-path reference patterns.
  Ensures no sensitive personal data is stored directly in case artifacts,
  prompts, or trace outputs.

authority_references:
  agent_contract: ops/agents/tax-legal-agent.contract.md
  boundary_contract: docs/governance/TAX_LEGAL_AGENT_BOUNDARY.md
  retention_contract: ops/bindings/taxlegal.retention.contract.yaml

# ────────────────────────────────────────────────────────────────────────────
# PII CLASSES
# ────────────────────────────────────────────────────────────────────────────
pii_classes:
  - id: ssn
    label: "Social Security Number"
    sensitivity: critical
    pattern_hint: "\\d{3}-\\d{2}-\\d{4}"
    storage: secret_path_reference_only
    log_policy: never

  - id: ein
    label: "Employer Identification Number"
    sensitivity: critical
    pattern_hint: "\\d{2}-\\d{7}"
    storage: secret_path_reference_only
    log_policy: never

  - id: dob
    label: "Date of Birth"
    sensitivity: high
    storage: secret_path_reference_only
    log_policy: never

  - id: account_number
    label: "Financial Account Number"
    sensitivity: critical
    storage: secret_path_reference_only
    log_policy: never

  - id: full_address
    label: "Full Physical Address"
    sensitivity: medium
    storage: secret_path_reference_only
    log_policy: redact_before_log

  - id: phone_number
    label: "Phone Number"
    sensitivity: medium
    storage: secret_path_reference_only
    log_policy: redact_before_log

  - id: email_address
    label: "Email Address"
    sensitivity: low
    storage: case_artifact_allowed
    log_policy: redact_before_log

# ────────────────────────────────────────────────────────────────────────────
# SECRET PATH REFERENCE PATTERN
# ────────────────────────────────────────────────────────────────────────────
secret_path_pattern:
  provider: infisical
  convention: >
    PII values are stored in Infisical under project-scoped paths.
    Case artifacts reference secrets by path only, never by value.
  path_template: "/spine/tax-legal/{case_id}/{pii_class}"
  example:
    ssn: "ref:infisical:/spine/tax-legal/CASE-TAXLEGAL-20260303-0001/ssn"
    ein: "ref:infisical:/spine/tax-legal/CASE-TAXLEGAL-20260303-0001/ein"

# ────────────────────────────────────────────────────────────────────────────
# REDACTION MODES
# ────────────────────────────────────────────────────────────────────────────
redaction_modes:
  - id: full_redact
    description: "Replace PII value with [REDACTED:{pii_class}]"
    applicable_to: [ssn, ein, dob, account_number]
    example: "[REDACTED:ssn]"

  - id: partial_redact
    description: "Show last 4 characters only: ***-**-1234"
    applicable_to: [ssn, ein, account_number]
    requires_approval: true
    example: "***-**-1234"

  - id: reference_replace
    description: "Replace value with secret path reference"
    applicable_to: all
    example: "ref:infisical:/spine/tax-legal/CASE-001/ssn"

# ────────────────────────────────────────────────────────────────────────────
# LOG POLICIES
# ────────────────────────────────────────────────────────────────────────────
log_policies:
  redact_before_log:
    description: >
      All prompt inputs, trace outputs, and mailroom event payloads must
      pass through PII scanning and redaction before being written to any
      log or artifact store.
    enforcement: planned_gate
    detail:
      - "Scan for all registered PII class patterns"
      - "Apply full_redact mode by default"
      - "Log redaction event with case_id and pii_class (not the value)"

  case_artifact_policy:
    description: >
      Case artifacts (intake.md, research outputs, filing packets) must
      reference PII by secret path only. Direct values are a boundary
      violation.
    enforcement: planned_gate

  prompt_policy:
    description: >
      Prompts sent to language models must not contain raw PII values.
      Use redacted placeholders or secret path references.
    enforcement: planned_gate

# ────────────────────────────────────────────────────────────────────────────
# CASE ISOLATION
# ────────────────────────────────────────────────────────────────────────────
case_isolation:
  cross_case_data_sharing: forbidden
  description: >
    PII and case-specific data must not be shared across unrelated cases.
    Each case maintains its own secret path namespace and artifact scope.
  exceptions:
    - "Operator-approved cross-case research for the same legal entity"

# ────────────────────────────────────────────────────────────────────────────
# PRIVACY CAPABILITIES
# ────────────────────────────────────────────────────────────────────────────
capabilities:
  - id: taxlegal.privacy.scan
    safety: read-only
    approval: auto
    description: "Detect PII leakage risk in case artifacts"
    lifecycle: experimental

  - id: taxlegal.privacy.redact
    safety: mutating
    approval: manual
    description: "Apply governed redaction policy to case artifacts"
    lifecycle: experimental
    guardrail: "Requires manual approval for destructive redaction operations"

# ────────────────────────────────────────────────────────────────────────────
# PLANNED GATES
# ────────────────────────────────────────────────────────────────────────────
planned_gates:
  - id: D337
    name: taxlegal-privacy-redaction-lock
    purpose: "Ensure no direct SSN/EIN-like tokens in case outputs/log artifacts"
    mode: report
    promote_after_clean_runs: 3

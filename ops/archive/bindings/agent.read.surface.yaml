# Agent Read Surface Binding (SSOT)
# Defines the canonical startup read surface and host/service update routing.
# Enforced by: surfaces/verify/d26-agent-read-surface.sh
# Status: authoritative
# Last verified: 2026-02-22

version: 1

workspaces:
  spine: "~/code/agentic-spine"
  workbench: "~/code/workbench"
  mint_modules: "~/code/mint-modules"

startup_read_surface:
  - docs/governance/SESSION_PROTOCOL.md
  - docs/governance/AGENT_GOVERNANCE_BRIEF.md

host_fact_routes:
  host_detail:
    - docs/governance/MACBOOK_SSOT.md
    - docs/governance/MINILAB_SSOT.md
    - docs/governance/SHOP_SERVER_SSOT.md
  identity: docs/governance/DEVICE_IDENTITY_SSOT.md
  services: docs/governance/SERVICE_REGISTRY.yaml

external_entrypoints:
  - repo: workbench
    path: AGENT_ENTRY.md
    must_reference: "/Users/ronnyworks/code/agentic-spine/docs/governance/SESSION_PROTOCOL.md"
  - repo: mint_modules
    path: AGENT_ENTRY.md
    must_reference: "/Users/ronnyworks/code/agentic-spine/docs/governance/SESSION_PROTOCOL.md"

path_style_policy:
  canonical: repo_relative
  absolute_path_allowed_when:
    - launcher_runtime_contracts
    - external_entrypoint_contract_checks
    - generated_runtime_identity_projections

wrapper_boundaries:
  secrets_exec:
    responsibility: "single-process governed secret injection for local capability execution"
    non_responsibility:
      - capability_routing
      - remote_transport
  mcp_bridge:
    responsibility: "tool transport and capability mediation for IDE/remote agents"
    non_responsibility:
      - local_secret_injection

forbidden_terms:
  - "00_CLAUDE.md"

contract_id: CLOUDFLARE_ADVANCED_SCOPE_V1
version: "1.0"
status: active
created: "2026-03-03"
authority: ops/bindings/cloudflare.inventory.yaml
parent_contract: null

description: >
  Scope contract for Cloudflare advanced platform capabilities beyond the
  core DNS/tunnel/registrar layer. Covers Workers, R2, Pages, Access, and WAF
  API wrappers with governance guardrails and MCP activation prerequisites.

# ────────────────────────────────────────────────────────────────────────────
# WORKERS
# ────────────────────────────────────────────────────────────────────────────
workers:
  status: active
  capabilities:
    - cloudflare.workers.list       # read-only inventory
    - cloudflare.workers.deploy     # mutating with dry-run default
  api_endpoints:
    - method: GET
      path: /accounts/{account_id}/workers/scripts
      purpose: list all worker scripts
      safety: read-only
    - method: PUT
      path: /accounts/{account_id}/workers/scripts/{script_name}
      purpose: upload/update worker script
      safety: mutating
      guardrail: dry-run by default, requires --confirm
  governance:
    approval: manual for deploy, auto for list
    dry_run_default: true
    token_scope_required: "Workers Scripts:Edit"

# ────────────────────────────────────────────────────────────────────────────
# R2 (Object Storage)
# ────────────────────────────────────────────────────────────────────────────
r2:
  status: active
  capabilities:
    - cloudflare.r2.bucket.list     # read-only bucket inventory
    - cloudflare.r2.object.list     # read-only object listing
  api_endpoints:
    - method: GET
      path: /accounts/{account_id}/r2/buckets
      purpose: list all R2 buckets
      safety: read-only
    - method: GET
      path: /accounts/{account_id}/r2/buckets/{bucket_name}/objects
      purpose: list objects in a bucket
      safety: read-only
  planned_capabilities:
    - cloudflare.r2.bucket.create   # create new bucket
    - cloudflare.r2.object.put      # upload object
    - cloudflare.r2.object.delete   # delete object
  governance:
    approval: auto for read, manual for mutating
    token_scope_required: "Workers R2 Storage:Read"
    token_scope_mutating: "Workers R2 Storage:Edit"

# ────────────────────────────────────────────────────────────────────────────
# PAGES
# ────────────────────────────────────────────────────────────────────────────
pages:
  status: active
  capabilities:
    - cloudflare.pages.list         # read-only project inventory
  api_endpoints:
    - method: GET
      path: /accounts/{account_id}/pages/projects
      purpose: list all Pages projects
      safety: read-only
  planned_capabilities:
    - cloudflare.pages.project.get      # project detail + deployment history
    - cloudflare.pages.deploy           # trigger deployment
    - cloudflare.pages.domain.set       # custom domain binding
  governance:
    approval: auto for read, manual for deploy/domain mutations
    dry_run_default: true
    token_scope_required: "Cloudflare Pages:Read"
    token_scope_mutating: "Cloudflare Pages:Edit"

# ────────────────────────────────────────────────────────────────────────────
# ACCESS (Zero Trust)
# ────────────────────────────────────────────────────────────────────────────
access:
  status: planned
  capabilities: []
  planned_capabilities:
    - cloudflare.access.apps.list       # list Access applications
    - cloudflare.access.apps.get        # get single app detail + policies
    - cloudflare.access.policies.list   # list policies for an app
    - cloudflare.access.service.tokens.list  # list service tokens
    - cloudflare.access.service.tokens.rotate  # rotate a service token
  api_endpoints:
    - method: GET
      path: /accounts/{account_id}/access/apps
      purpose: list Access applications
      safety: read-only
    - method: GET
      path: /accounts/{account_id}/access/apps/{app_id}
      purpose: get Access application detail
      safety: read-only
    - method: GET
      path: /accounts/{account_id}/access/apps/{app_id}/policies
      purpose: list policies for an app
      safety: read-only
    - method: GET
      path: /accounts/{account_id}/access/service_tokens
      purpose: list service tokens
      safety: read-only
    - method: POST
      path: /accounts/{account_id}/access/service_tokens/{token_id}/rotate
      purpose: rotate service token
      safety: mutating
      guardrail: requires manual approval, audit log entry
  governance:
    approval: auto for read, manual for mutations
    token_scope_required: "Access: Apps and Policies:Read"
    token_scope_mutating: "Access: Apps and Policies:Edit"
  prerequisites:
    - existing Access app inventory in cloudflare.inventory.yaml
    - service token metadata tracked per app

# ────────────────────────────────────────────────────────────────────────────
# WAF (Web Application Firewall)
# ────────────────────────────────────────────────────────────────────────────
waf:
  status: planned
  capabilities: []
  planned_capabilities:
    - cloudflare.waf.rules.list         # list WAF custom rules per zone
    - cloudflare.waf.rules.get          # get single rule detail
    - cloudflare.waf.managed.list       # list managed rulesets
    - cloudflare.waf.analytics.summary  # WAF event summary
  api_endpoints:
    - method: GET
      path: /zones/{zone_id}/rulesets
      purpose: list rulesets (custom + managed)
      safety: read-only
    - method: GET
      path: /zones/{zone_id}/rulesets/{ruleset_id}
      purpose: get ruleset detail
      safety: read-only
    - method: GET
      path: /zones/{zone_id}/security/events
      purpose: WAF analytics/events
      safety: read-only
  governance:
    approval: auto for read, manual for rule mutations
    token_scope_required: "Zone WAF:Read"
    token_scope_mutating: "Zone WAF:Edit"
  prerequisites:
    - zone inventory validated via cloudflare.inventory.yaml
    - WAF rule baseline documented before mutation capabilities

# ────────────────────────────────────────────────────────────────────────────
# MCP ACTIVATION PATH
# ────────────────────────────────────────────────────────────────────────────
mcp_activation:
  status: planned
  description: >
    MCP (Model Context Protocol) bridge activation for Cloudflare capabilities.
    Enables Claude Desktop and hosted runtimes to invoke Cloudflare capabilities
    through the MCP tool interface.
  prerequisites:
    - All read-only capabilities must be stable (lifecycle: ready) before MCP wiring
    - Token scope must be validated for each capability via cloudflare.token.health
    - MCP tool definitions must reference the canonical capability scripts
    - Service token for hosted runtimes already exists (spine-bridge-hosted-runtime)
  activation_sequence:
    - step: 1
      action: "Register read-only capabilities as MCP tools"
      capabilities:
        - cloudflare.workers.list
        - cloudflare.r2.bucket.list
        - cloudflare.r2.object.list
        - cloudflare.pages.list
        - cloudflare.zone.list
        - cloudflare.dns.status
        - cloudflare.tunnel.status
        - cloudflare.registrar.status
      safety: read-only
    - step: 2
      action: "Register mutating capabilities with confirmation gates"
      capabilities:
        - cloudflare.workers.deploy
        - cloudflare.dns.record.set
        - cloudflare.tunnel.ingress.set
      safety: mutating
      guardrail: "MCP tool must enforce --dry-run default, require explicit confirmation"
    - step: 3
      action: "Wire Access/WAF capabilities after implementation"
      blocked_by: "access.status != planned, waf.status != planned"
  governance:
    mcp_tool_naming: "cloudflare_{capability_suffix}"
    approval_model: "read-only=auto, mutating=manual with dry-run default"
    parity_check: "D66 MCP parity gate must pass after registration"

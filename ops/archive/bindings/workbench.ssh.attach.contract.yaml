status: authoritative
owner: "@ronny"
last_verified: 2026-03-05
scope: workbench-ssh-attach-projection
workbench_root: /Users/ronnyworks/code/workbench
spine_binding: ops/bindings/ssh.targets.yaml
workbench_ssh_config: dotfiles/ssh/config.d/tailscale.conf
generator_script: bin/generators/gen-workbench-ssh-config.sh
attach_file: .spine-link.yaml
attach_policy: ops/bindings/project.attach.link.policy.yaml
projection_policy:
  lan_first_targets: tailscale_first_for_human_runtime
  tailscale_required_targets: direct_tailscale
  lan_only_targets: proxyjump_via_probe_via
checks:
  - id: attach_file_present
    description: Workbench attach file must exist.
    enforce: true
  - id: attach_source_registry_match
    description: Attach source_registry must point to spine agents registry.
    expected_source_registry: ops/bindings/agents.registry.yaml
    enforce: true
  - id: attach_repo_root_only
    description: project_binding repo-path root policy is explicit in project.attach.link.policy.yaml (nested paths permitted only when explicitly declared).
    expected: false
    enforce: true
  - id: spine_id_present_as_primary_host
    description: Every spine ssh target id must be a primary Host alias in workbench ssh config.
    enforce: true
  - id: no_untracked_primary_hosts
    description: Every primary Host alias in workbench ssh config must map to a spine ssh target id.
    enforce: true
  - id: generated_from_spine_binding
    description: Workbench ssh config must be generated from spine ssh.targets via the declared generator script.
    enforce: true
  - id: user_parity
    description: Shared ids must keep user parity between spine and workbench; host projection follows projection_policy.
    enforce: true
exceptions: []

      spine_source: docs/governance/TAX_LEGAL_AGENT_BOUNDARY.md
      spine_stub: docs/governance/domains/tax-legal/TAX_LEGAL_AGENT_BOUNDARY.md
      detail: "Boundary contract is spine-native (not workbench), so stub points to self"

    - domain: tax-legal
      spine_source: docs/governance/domains/tax-legal/RUNBOOK.md
      spine_stub: docs/governance/domains/tax-legal/RUNBOOK.md
      detail: "Runbook is spine-native"

    - domain: tax-legal
      spine_source: docs/governance/domains/tax-legal/BUSINESS_LIFECYCLE_PLAYBOOK.md
      spine_stub: docs/governance/domains/tax-legal/BUSINESS_LIFECYCLE_PLAYBOOK.md
      detail: "Lifecycle playbook is spine-native"

    - domain: tax-legal
      spine_source: docs/governance/domains/tax-legal/ANONYMITY_PRIVACY_MODEL.md
      spine_stub: docs/governance/domains/tax-legal/ANONYMITY_PRIVACY_MODEL.md
      detail: "Privacy model is spine-native"

    - domain: tax-legal
      spine_source: docs/governance/domains/tax-legal/CASE_TEMPLATES.md
      spine_stub: docs/governance/domains/tax-legal/CASE_TEMPLATES.md
      detail: "Case templates is spine-native"


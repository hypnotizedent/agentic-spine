# Tax-Legal Domain Routing Integration Spec
# Status: planned (Wave 1 design-only)
# Gaps: GAP-OP-1433, GAP-OP-1434, GAP-OP-1435, GAP-OP-1436
# Loop: LOOP-TAXLEGAL-W1-DOMAIN-ROUTING-INTEGRATION-20260303
# Plan: PLAN-TAX-LEGAL-OPS-WORKER-20260303

contract_id: TAXLEGAL_DOMAIN_ROUTING_SPEC_V1
version: "1.0"
lifecycle: experimental
created: "2026-03-03"
owner: "@ronny"
scope: taxlegal-domain-routing-integration

description: >
  Planned delta specification for integrating the tax-legal domain into
  the spine's registry, terminal role, taxonomy bridge, and domain docs
  routing surfaces. These changes are documented here as a spec and will
  be applied to the target files during implementation promotion.

# ────────────────────────────────────────────────────────────────────────────
# AGENTS REGISTRY DELTA (GAP-OP-1433)
# Target: ops/bindings/agents.registry.yaml
# ────────────────────────────────────────────────────────────────────────────
agents_registry_delta:
  target_file: ops/bindings/agents.registry.yaml
  action: add_entry
  gap: GAP-OP-1433

  domain_mapping_entry:
    tax-legal:
      domain_slug: tax-legal
      folder_name: tax-legal

  agent_entry:
    id: tax-legal-agent
    name: "Tax-Legal Agent"
    domain: tax-legal
    description: "Tax-legal compliance coordination, citation-strict research, business lifecycle operations"
    contract: "ops/agents/tax-legal-agent.contract.md"
    implementation: planned
    implementation_status: planned
    mcp_type: planned
    mcp_server: null
    routing_keywords:
      - tax
      - legal
      - compliance
      - filing
      - deadline
      - case
      - citation
      - jurisdiction
      - formation
      - dissolution
      - enforcement
      - btr
      - annual-report
      - ein
      - sales-tax
      - 1099
      - dr-15
    capabilities:
      - taxlegal.case.intake
      - taxlegal.case.status
      - taxlegal.case.closeout
      - taxlegal.sources.sync
      - taxlegal.sources.diff
      - taxlegal.research.answer
      - taxlegal.research.compare
      - taxlegal.deadlines.refresh
      - taxlegal.deadlines.status
      - taxlegal.packet.generate
      - taxlegal.memo.attorney_cpa
      - taxlegal.privacy.scan
      - taxlegal.privacy.redact
      - taxlegal.retention.enforce
    write_scope:
      - ops/agents/tax-legal-agent.contract.md
      - ops/bindings/taxlegal.*.yaml
      - docs/governance/domains/tax-legal/
    gates: []

# ────────────────────────────────────────────────────────────────────────────
# TERMINAL ROLE CONTRACT DELTA (GAP-OP-1434)
# Target: ops/bindings/terminal.role.contract.yaml
# ────────────────────────────────────────────────────────────────────────────
terminal_role_delta:
  target_file: ops/bindings/terminal.role.contract.yaml
  action: add_role
  gap: GAP-OP-1434

  role_entry:
    id: DOMAIN-TAXLEGAL-01
    type: domain-runtime
    description: "Tax-legal compliance coordination and citation-strict research operations."
    lifecycle: experimental
    default_tool: codex
    picker_group: domain-runtime
    sort_order: 490
    write_scope:
      - ops/agents/tax-legal-agent.contract.md
      - ops/bindings/taxlegal.*.yaml
      - docs/governance/domains/tax-legal/
      - runtime/domain-state/taxlegal/cases/
    capabilities:
      - taxlegal.case.intake
      - taxlegal.case.status
      - taxlegal.case.closeout
      - taxlegal.sources.sync
      - taxlegal.sources.diff
      - taxlegal.research.answer
      - taxlegal.research.compare
      - taxlegal.deadlines.refresh
      - taxlegal.deadlines.status
      - taxlegal.packet.generate
      - taxlegal.memo.attorney_cpa
      - taxlegal.privacy.scan
      - taxlegal.privacy.redact
      - taxlegal.retention.enforce

# ────────────────────────────────────────────────────────────────────────────
# DOMAIN TAXONOMY BRIDGE DELTA (GAP-OP-1435)
# Target: ops/bindings/domain.taxonomy.bridge.contract.yaml
# ────────────────────────────────────────────────────────────────────────────
taxonomy_bridge_delta:
  target_file: ops/bindings/domain.taxonomy.bridge.contract.yaml
  action: add_catalog_domain_mapping
  gap: GAP-OP-1435

  catalog_domain_mapping_entry:
    domain_slug: tax-legal
    folder_name: tax-legal
    role_id: DOMAIN-TAXLEGAL-01
    role_status: planned
    agent_id: tax-legal-agent
    mapping_state: planned-runtime

  taxonomy_note:
    slug: tax-legal
    intent: "Tax-legal compliance coordination and citation-strict research governance surface."
    canonical_folder: docs/governance/domains/tax-legal

# ────────────────────────────────────────────────────────────────────────────

# Status: authoritative
# Last verified: 2026-03-03
# Decision: approved for promotion (GAP-OP-1369)

version: 1
updated_at: "2026-03-03"
owner: "@ronny"
scope: mail-archiver-domain-boundary
status: authoritative

parent_loop: LOOP-MAIL-ARCHIVER-POST-SYNC-STABILIZATION-20260302
addresses_gap: GAP-OP-1369

purpose: |
  Define email domain boundaries for routing, tagging, retention policy, and
  backup priority. Each mail-archiver account operates in a domain class that
  determines how its messages are treated for retention, pruning, and disaster
  retrieval priority.

integration:
  account_linkage_contract: ops/bindings/mail.archiver.account.linkage.contract.yaml
  retention_contract: ops/bindings/mail.archiver.retention.contract.yaml
  classification_contract: ops/bindings/mail.archiver.email.classification.contract.yaml
  backup_contract: ops/bindings/mail.archiver.backup.contract.yaml
  overlap_playbook: docs/governance/domains/communications/MAIL_ARCHIVER_OVERLAP_CLEANUP_PLAYBOOK.md

domain_classes:
  - id: business
    display_name: Business
    description: |
      Email tied to a registered business entity, customer communication,
      vendor correspondence, or commercial operations. Subject to potential
      legal/tax retention requirements.
    retention_floor: indefinite
    backup_priority: high
    pruning_policy: manual-only
    disaster_retrieval_priority: 1

  - id: personal
    display_name: Personal
    description: |
      Private email for family, friends, personal services, and non-business
      correspondence. High sentimental value but no legal retention mandate.
    retention_floor: indefinite
    backup_priority: high
    pruning_policy: owner-discretion
    disaster_retrieval_priority: 2

  - id: infrastructure
    display_name: Infrastructure
    description: |
      System-generated email for infrastructure operations. Alerts, monitoring
      notifications, service account correspondence. Operationally important
      but individually low-value after acknowledgment window.
    retention_floor: rolling_90d
    backup_priority: standard
    pruning_policy: automated-eligible
    disaster_retrieval_priority: 3

  - id: shared
    display_name: Shared / Cross-Domain
    description: |
      Aliases that receive mail from multiple domain classes (e.g., a personal
      Gmail that also handles some business correspondence). Requires per-message
      classification rather than blanket domain-level rules.
    retention_floor: indefinite
    backup_priority: high
    pruning_policy: per-message-classification
    disaster_retrieval_priority: 1
    note: "Falls back to email classification contract for per-message decisions."

account_domain_assignments:
  description: |
    Maps each mail-archiver account (from account.linkage.contract) to its
    primary domain class. Accounts assigned to 'shared' require per-message
    classification for retention decisions.
  assignments:
    - account_id: gmail-primary
      db_account_id: 1
      mailbox: hypnotizedent@gmail.com
      domain_class: shared
      rationale: |
        Gmail primary is a long-lived personal account that also received some
        business correspondence (Mint Prints early days, freelance). Domain
        class is 'shared' because historical mail spans personal and business
        contexts. Per-message classification required.

    - account_id: stalwart-ops
      db_account_id: 2
      mailbox: ops@spine.ronny.works
      domain_class: infrastructure
      rationale: |
        Stalwart ops mailbox receives only infrastructure/agent notifications.
        Pure operational lane with no personal or business content.

    - account_id: microsoft-primary
      db_account_id: 3
      mailbox: ronny@mintprints.com
      domain_class: business
      rationale: |
        Microsoft M365 account is the canonical Mint Prints business mailbox.
        All correspondence is business-context (customers, vendors, tax, legal).

    - account_id: icloud-primary
      db_account_id: 4
      mailbox: ronny@hantash.com
      domain_class: personal
      rationale: |
        iCloud account is Ronny's personal mailbox. Family, personal services,
        Apple ecosystem notifications.

routing_implications:
  description: |
    How domain class affects mail-archiver behavior across the contract stack.
  rules:
    - domain_class: business
      tag_prefix: "domain:business"
      retention: "Indefinite. Never auto-pruned."
      backup: "Included in all backup tiers (VM-level + app-level pg_dump)."
      overlap_policy: "Preserve all copies. Cross-account business mail is evidence."
      retrieval_note: "First priority in disaster retrieval. Account 3 searched first."

    - domain_class: personal
      tag_prefix: "domain:personal"
      retention: "Indefinite by default. Transactional sub-class may be pruned per classification contract."
      backup: "Included in all backup tiers."
      overlap_policy: "Preserve all copies."
      retrieval_note: "Second priority. Accounts 1 and 4 searched by alias timeline."

    - domain_class: infrastructure
      tag_prefix: "domain:infra"
      retention: "90-day rolling default. Alerts older than 90 days are prune-eligible."
      backup: "Included in VM-level backup. App-level pg_dump covers all accounts."
      overlap_policy: "Within-account duplicates are safe to dedupe."
      retrieval_note: "Third priority. Account 2 searched for ops audit."

    - domain_class: shared
      tag_prefix: "domain:shared"
      retention: "Per-message classification determines retention. Default is indefinite until classified."
      backup: "Included in all backup tiers (cannot exclude unclassified mail)."
      overlap_policy: "Preserve all copies until per-message classification is applied."
      retrieval_note: "First priority (matches business). Account 1 alias timeline is critical."

tag_taxonomy:
  description: |
    Tags applied to messages in mail-archiver based on domain boundary and
    classification tier. Tags are additive (a message can have both domain
    and classification tags).
  structure:
    domain_tags:
      - "domain:business"
      - "domain:personal"
      - "domain:infra"
      - "domain:shared"
    classification_tags:
      - "retention:permanent"
      - "retention:1y"
      - "retention:90d"
      - "retention:30d"
      - "retention:7d"
    source_tags:
      - "source:gmail"
      - "source:icloud"
      - "source:microsoft"
      - "source:stalwart"
  application_order:
    - "1. Source tag applied at ingest time (automatic from account linkage)."
    - "2. Domain tag applied based on this contract's account_domain_assignments."
    - "3. Classification tag applied when classification capability is implemented."
    - "4. Tags are immutable after application unless reclassification is explicitly triggered."

implementation:
  implementation_state: not-implemented
  description: |
    Domain boundary tagging is a future capability. This contract defines the
    assignment rules and routing implications so agents and operators have a
    governed reference for domain-level decisions.
  blockers:
    - "Requires Ronny arch decision on domain assignments (especially Gmail shared vs personal)"
    - "No mail-archiver tagging API exists yet"
    - "Classification contract (D1) must be promoted to authoritative first"

evidence:
  closes_gaps:
    - GAP-OP-1369
  draft_review_required: false
  review_decision_by: "@ronny"
